.card{position:relative;margin-top:13px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:19px 20px 18px;box-shadow:0 12px 30px var(--shadow)}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}.tag{font-size:12px;line-height:1.5;color:var(--green);background:var(--green-soft);padding:3px 9px;border-radius:999px}.tag.source{color:var(--brown-dark);background:#f3e7dc}.text{white-space:pre-wrap;font-size:18px;line-height:1.82;min-height:150px;max-height:310px;overflow:auto;overscroll-behavior:contain;margin:10px 0 12px;padding-right:3px}.text::-webkit-scrollbar{width:5px}.text::-webkit-scrollbar-thumb{background:#d5c5b2;border-radius:9px}.statusline{display:flex;justify-content:space-between;gap:8px;border-top:1px dashed var(--line);padding-top:10px;color:var(--muted);font-size:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}.btn{appearance:none;border:1px solid var(--line);background:#fffefa;color:var(--ink);border-radius:12px;min-height:44px;padding:8px 12px;font-size:15px;cursor:pointer}.btn.primary{grid-column:1/-1;background:var(--brown);border-color:var(--brown);color:#fff;font-weight:800;min-height:52px;font-size:16px;box-shadow:0 6px 15px rgba(150,85,52,.15)}.btn.secondary{color:var(--green);font-weight:700}.btn:disabled{opacity:.4;cursor:not-allowed}.empty{min-height:230px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted)}
details{margin-top:14px;border-top:1px solid rgba(150,85,52,.15);padding-top:4px}summary{cursor:pointer;color:var(--muted);font-weight:700;padding:10px 2px}.used-tools{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 9px}.btn.small{min-height:36px;padding:5px 10px;font-size:13px;color:var(--muted)}.used-list{display:grid;gap:7px}.used-item{background:rgba(255,253,248,.82);border:1px solid var(--line);border-radius:12px;padding:11px}.used-meta{font-size:11px;color:var(--muted)}.used-text{font-size:13px;line-height:1.6;margin:5px 0 8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.feedback{position:fixed;z-index:10;left:50%;bottom:22px;transform:translate(-50%,10px);background:#352920;color:#fff;padding:10px 16px;border-radius:11px;opacity:0;pointer-events:none;transition:.18s;white-space:nowrap}.feedback.show{opacity:1;transform:translate(-50%,0)}

</main><div id="feedback" class="feedback" role="status"></div><script>
const copyData=[{"id":"QW-V12-001","source":"真实朋友圈","category":"上新开卖","sku":"通用","keywords":"雨季, 开季, 野生菌","text":"朋友们！！！雨季快到了！！！！菌子很快出来了！！！！有多少人在等菌子的？菌子一出来我就要干活了。"},{"id":"QW-V12-002","source":"真实朋友圈","category":"上新开卖","sku":"干巴菌","keywords":"干巴菌, 开季, 预热","text":"好！！！请干巴菌长得快一点。"},{"id":"QW-V12-003","source":"真实轻改","category":"上新开卖","sku":"通用","keywords":"楚雄, 开季, 老朋友","text":"楚雄本地菌要开始了，很多老朋友已经问了好久了。这也是我做野生菌的第七年，初心不改，我卖给各位的也是我自己吃的。"},{"id":"QW-V12-004","source":"真实朋友圈","category":"上新开卖","sku":"通用","keywords":"下周, 山里, 收菌","text":"现在还没有，下周就有啦，这几天在山里收菌子了。"},{"id":"QW-V12-005","source":"真实朋友圈","category":"上新开卖","sku":"通用","keywords":"菌子生长, 等等, 收菌","text":"菌子陆陆续续在长啦，现在长得还太少太少了，大家再等等哈。我们一家人最近都在山里收菌子，回信息不及时，抱歉抱歉。"},{"id":"QW-V12-006","source":"真实朋友圈","category":"上新开卖","sku":"通用","keywords":"楚雄, 下雨, 头茬菌","text":"好消息！！！楚雄开始连着下雨了，菌子就能蹭蹭长。今年第一茬楚雄野生菌快有了，有敢吃头茬见手青的吗？"},{"id":"QW-V12-007","source":"待人工确认","category":"上新开卖","sku":"通用","keywords":"头水菌, 价格, 见手青, 干巴菌","text":"好消息：头水菌有了。不是好消息：贵得不得了，见手青250一斤，青头菌还要600到800，干巴菌更吓人，2000到3000一斤。卖不起啊……而且洗菌子炒菌子还有很多损耗，一斤菌子最多出六七两炒菌。"},{"id":"QW-V12-008","source":"待人工确认","category":"上新开卖","sku":"白葱","keywords":"白葱, 价格, 上市","text":"天呐……今天白葱要680一公斤，快跟金子一样贵了。有人吃上菌子了吗？"},{"id":"QW-V12-009","source":"真实轻改","category":"上新开卖","sku":"白葱","keywords":"白见手青, 楚雄, 开炒","text":"今年最新的一批楚雄白见手青终于来了！！！我哥刚刚从山里收回来的，最近雨水多一点，菌子的价格能稍微下来些了。我们这就开始洗菌子，尽快炒好送到大家手里。"},{"id":"QW-V12-010","source":"待人工确认","category":"上新开卖","sku":"白葱","keywords":"白葱, 预留, 私信","text":"要预留的朋友可以留个评论或者私信我哈。感谢大家一直的支持，我也会给到大家最好的品质和价格。"},{"id":"QW-V12-011","source":"待人工确认","category":"上新开卖","sku":"白葱","keywords":"白葱, 刚炒好, 开卖","text":"炒菌可以买了，刚刚主厨炒出来了。买回家热热就可以吃，或者再加点青椒大蒜。盐巴正常是够的，有些朋友吃盐重的话，可以再放一点。今天189一份，400克。"},{"id":"QW-V12-012","source":"真实朋友圈","category":"上新开卖","sku":"通用","keywords":"鸡枞, 黄牛肝, 红葱, 货况","text":"我们从上菌子以来，都是我哥收到什么卖什么。现在楚雄本地出的最多的是白葱，鸡枞这段时间就收到一两朵，黄牛肝几朵，红葱慢慢开始有点……山里出什么，我们就卖什么。"},{"id":"QW-V12-013","source":"真实朋友圈","category":"上新开卖","sku":"红葱","keywords":"红葱, 需求, 预热","text":"有多少朋友想吃我们家炒红葱的？来举个手。我是很纠结要不要上啊，怕外地朋友没热透把自己闹翻掉。"},{"id":"QW-V12-014","source":"真实朋友圈","category":"上新开卖","sku":"红葱","keywords":"红葱, 云南朋友, 香","text":"红葱是更霸道的香气，我再纠结一下。好多云南朋友也在追着我要红葱。"},{"id":"QW-V12-015","source":"待人工确认","category":"上新开卖","sku":"私人定制","keywords":"私人定制, 红葱, 菜籽油, 口味","text":"新品上架啦！想吃红葱、想要菜籽油炒的、不吃辣、不吃蒜的朋友，以前都不好单独安排，今年可以给大家开小灶。菌子是一样的菌子，只是按你家的口味来炒。"},{"id":"QW-V12-016","source":"真实轻改","category":"上新开卖","sku":"黄牛肝","keywords":"黄牛肝, 黑牛肝, 冒头, 货况","text":"好多朋友问，我家现在怎么只有白葱？黄牛肝、黑牛肝才刚开始冒头，量还少，收几天回来都不够炒一锅。山上出什么，我们就收什么、炒什么；还没出，或者品质不够，就暂时不卖。"},{"id":"QW-V12-017","source":"真实朋友圈","category":"上新开卖","sku":"通用","keywords":"当天到货, 分拣, 客户挑菌","text":"今天的菌子到货了！还没拆完、分拣完，老顾客就过来挑了。"},{"id":"QW-V12-018","source":"真实朋友圈","category":"上新开卖","sku":"干巴菌","keywords":"干巴菌, 开卖, 手工清洗","text":"干巴菌今天开始了，目前卖的是思茅干巴菌，人工清洗，基本没沙，物超所值。"},{"id":"QW-V12-019","source":"待人工确认","category":"上新开卖","sku":"私人定制","keywords":"私人定制, 起订, 忙不过来","text":"私人定制的太多了，我们大厨从早上一直炒到现在。现在起要私人定制的都是10包起了，实在是忙不过来，希望各位理解。接下来就是炒干巴菌了，需要预定的跟我说。"},{"id":"QW-V12-020","source":"待人工确认","category":"上新开卖","sku":"红葱","keywords":"红葱, 下午开炒, 见手青","text":"今天红葱多哈，下午开始炒。红葱就是见手青，没炒熟有毒的。我们都是5包起，专门开一锅炒哈，要的来～"},{"id":"QW-V12-021","source":"真实朋友圈","category":"日常种草","sku":"通用","keywords":"午饭, 菌子季, 饭桌","text":"吃午饭了吗？一到菌子季，我们就顿顿菌子了。"},{"id":"QW-V12-022","source":"真实朋友圈","category":"日常种草","sku":"通用","keywords":"云南人, 冰箱, 米线","text":"云南人的冰箱，放满了菌子和米线。"},{"id":"QW-V12-023","source":"真实朋友圈","category":"日常种草","sku":"白葱","keywords":"白葱, 孩子, 米饭","text":"我家的炒白葱，我两个娃娃也都放放心心吃的。看他们吃得高兴，我也有成就感！就是太费米饭了，嘴巴根本停不下来。"},{"id":"QW-V12-024","source":"真实朋友圈","category":"日常种草","sku":"白葱","keywords":"白葱, 青椒, 蒜片, 出锅","text":"有朋友问我白葱要怎么炒才香，拍个视频给大家看一下：中火把青椒蒜片爆香，菌子倒进去翻炒，热透了可以出锅啦～简单方便又美味。"},{"id":"QW-V12-025","source":"真实朋友圈","category":"日常种草","sku":"干巴菌","keywords":"干巴菌, 午饭, 犒劳","text":"今天终于有干巴菌了，赶紧先给自己炒一份来吃。中午吃见手青和干巴菌，犒劳一下小伙伴。洗干巴菌又要洗到晚上11点了。"},{"id":"QW-V12-026","source":"真实朋友圈","category":"日常种草","sku":"红葱","keywords":"红葱, 刚出锅, 一盆","text":"今天红葱见手青炒出来了，就这一盆哈。刚出锅的时候那个香，懂红葱的朋友一看就知道。"},{"id":"QW-V12-027","source":"真实轻改","category":"日常种草","sku":"干巴菌","keywords":"干巴菌, 炒饭, 多顿","text":"干巴菌听着贵，但一包能吃很多顿，特别是拿来炒饭。外面吃一份干巴菌炒饭也不便宜，买一包回去慢慢炒，既能省钱又能吃珍馐。"},{"id":"QW-V12-028","source":"真实朋友圈","category":"日常种草","sku":"红葱","keywords":"红葱, 香气, 云南人","text":"红葱是更霸道的香气。好多云南朋友追着我要，吃过的人是真的惦记这一口。"},{"id":"QW-V12-029","source":"真实朋友圈","category":"日常种草","sku":"通用","keywords":"端午, 晚餐, 小苦菜汤","text":"端午节晚餐，有谁懂这碗小苦菜汤的含金量？端午快乐！"},{"id":"QW-V12-030","source":"真实朋友圈","category":"日常种草","sku":"通用","keywords":"杂菌, 午饭, 云南","text":"我真的是太爱云南的菌子了。中午准备炒个杂菌吃吃哈～"},{"id":"QW-V12-031","source":"真实轻改","category":"日常种草","sku":"白葱","keywords":"第一锅, 刚炒好, 尝鲜","text":"第一锅菌子炒好了。今天先自己吃一些，也分给店上伙伴和亲朋好友尝尝。刚出锅的白葱端上桌，米饭是真的遭殃。"},{"id":"QW-V12-032","source":"真实朋友圈","category":"日常种草","sku":"通用","keywords":"山珍, 云南味, 炒菌","text":"菌子是天生天养的山珍。炒好端上桌，云南人的夏天就有味道了。"},{"id":"QW-V12-033","source":"真实朋友圈","category":"信任人设","sku":"通用","keywords":"冻货, 人工菌, 打假","text":"朋友们，现在就开始说有菌子卖的，99%都是去年的冻货。吃嘛也能吃，就是口感香味都不太好。菌子还没出，现在就有菌子卖的，不是冻货就是人工菌。"},{"id":"QW-V12-034","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"产区, 楚雄, 真假","text":"吃菌子要鲜香，就是要吃对产区。我们家只卖楚雄菌子，这个地区的菌味够鲜够香。产区不一样，味道真的不一样。"},{"id":"QW-V12-035","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"七年, 老顾客, 不泡药, 不泡水","text":"这是我做野生菌的第七年，积累了很多认可我的老顾客。初心不改，我卖给各位的也是我自己吃的，不泡药、不泡水、不美化，把大自然的样子原模原样送到大家手里。"},{"id":"QW-V12-036","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"收菌, 楚雄, 做菌多年","text":"我哥在楚雄姚安、大姚、南华这些片区收菌，做菌子生意三十多年。山里做生意不只看价格，也看多年情谊。有钱不一定买得到好货，认识货、守信用更重要。"},{"id":"QW-V12-037","source":"真实朋友圈","category":"信任人设","sku":"通用","keywords":"便宜, 原产地, 野生菌水深","text":"野生菌水很深。您要买便宜的野生菌，我们家可能不是最好的选择；如果要买产地明确、菌味浓、真正原生态的野生菌，可以多看看我们家。"},{"id":"QW-V12-038","source":"真实轻改","category":"信任人设","sku":"白葱","keywords":"白葱, 成本, 价格","text":"菌子确实一年比一年贵了，白见手青的收购价也一直在涨。现在不敢一下拿太多货，真货的成本就摆在那里。"},{"id":"QW-V12-039","source":"真实朋友圈","category":"信任人设","sku":"白葱","keywords":"尝鲜, 品质一般, 不劝买","text":"今天第一次炒出来的菌子，品质一般吧，因为才上。不着急吃的真的不推荐买，贵而且品质一般，只适合尝尝鲜。等一等，品质会更好，价格也能下来。"},{"id":"QW-V12-040","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"市场, 外省菌, 不以次充好","text":"有些品种山里都还没出，市场里就有卖的了，价格还便宜得离谱。我坚持只卖云南原产地山里收来的野生菌，不泡水增重，不泡药美化，不以次充好。耗损大、成本高，也不在品质上妥协。"},{"id":"QW-V12-041","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"人工菌, 药水, 新鲜菌","text":"有朋友想去市场买新鲜菌子，又担心买到泡药或者人工培育的。我还是拍个视频和大家讲清楚：看起来朵朵一样、漂亮得没一点虫眼的，反而要多留个心眼。"},{"id":"QW-V12-042","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"损耗, 虫眼, 次货","text":"纯天然野生菌切开有虫眼、有坏损很正常。处理得精细，精品货也会有两三成丢头；品质差的丢一半以上都正常。坏的、老的掺着炒，口感会柴、有沙、发酸发苦。"},{"id":"QW-V12-043","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"高仿货, 野山菌, 人工培育","text":"现在有不少人工养殖在山上的高仿货，擦边取名字叫“野山菌”。不是说不能吃，但别拿人工菌冒充当季野生菌。大家买的时候一定分清楚。"},{"id":"QW-V12-044","source":"真实朋友圈","category":"信任人设","sku":"白葱","keywords":"孩子, 妈妈, 安心","text":"我家的炒白葱，我两个娃娃也都放放心心吃的。看他们吃得高兴，我也有成就感！入口的东西，我自己家先要敢吃。"},{"id":"QW-V12-045","source":"真实朋友圈","category":"信任人设","sku":"红葱","keywords":"红葱, 外地朋友, 加热提醒","text":"有多少朋友想吃我们家炒红葱的？我是真的纠结要不要上，怕外地朋友没热透把自己闹翻掉。喜欢归喜欢，该认真加热还是要认真加热。"},{"id":"QW-V12-046","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"老带新, 复购, 感谢","text":"这两年各行各业都不容易，我们家野生菌能一直做下来，靠的是大家一年一年复购、介绍新朋友。我舍不得花钱打广告，只能发发朋友圈，更多还是靠大家吃过以后愿意帮忙说一句值得买。"},{"id":"QW-V12-047","source":"真实朋友圈","category":"信任人设","sku":"通用","keywords":"货况, 不乱卖, 山里","text":"山上出什么，我们就收什么、炒什么。山上还没出，或者品质不够，就宁愿暂时不卖。菌子品种多不稀奇，山里都还没出，市场上就有货才稀奇。"},{"id":"QW-V12-048","source":"真实轻改","category":"信任人设","sku":"通用","keywords":"客户反馈, 添加剂, 细节","text":"这两天被我家顾客们感动得掉眼泪了，这些都是真真实实的评价。菌子的品质和安全、炒菌子的调料，都是我亲力亲为。没尝过的新朋友可以多看多对比，尝过一次，心里自然有杆秤。"},{"id":"QW-V12-049","source":"真实轻改","category":"信任人设","sku":"白葱","keywords":"白葱, 水白葱, 打假, 价格","text":"打假科普—白葱：有些商家会把水白葱当白葱卖，或者掺着卖。水白葱炒出来偏酸，白葱又脆又香，价格也完全不是一回事。不弄虚作假是我的底线，不能为了低价拿假货糊弄人。"},{"id":"QW-V12-050","source":"真实轻改","category":"信任人设","sku":"红葱","keywords":"红葱, 紫葱, 打假, 混货","text":"打假科普—红葱：红葱和紫葱外观看着像，但不是一个品种。紫葱不是不能吃，不能拿来当红葱卖，更不能掺着卖。这两年假冒菌子低价冲击很大，我还是坚持货真价实，顾客的嘴巴就是尺子。"},{"id":"QW-V12-051","source":"真实朋友圈","category":"信任人设","sku":"红葱","keywords":"红葱, 活虫, 老顾客, 良心","text":"我们家的红葱菌虫都是活着的，恨不得把心剖开给各位看看，我们家做得有多良心。买我们家六七年的顾客就知道，外面价格一直波动，我们的价格和品质都是很良心的。"},{"id":"QW-V12-052","source":"真实轻改","category":"信任人设","sku":"红葱","keywords":"楚雄, 产地, 价格稳定","text":"我们的见手青是楚雄见手青。外面的价格一直波动，拿货价有时候也会很贵，但我们尽量稳定着卖。挑菌子的时候可以多看看产地，云南不同产区，味道真的有差别。"},{"id":"QW-V12-053","source":"真实朋友圈","category":"信任人设","sku":"通用","keywords":"云南, 保存, 热爱","text":"我真的是太爱云南的菌子了，可惜菌子保存真的太困难了。欢迎大家有机会来云南吃；暂时过不来的，我们有炒好的。让大家吃到云南美食，也算把我对菌子的爱传递出去了。"},{"id":"QW-V12-054","source":"真实朋友圈","category":"产品特色","sku":"白葱","keywords":"黑猪板油, 独头蒜, 皱皮青椒, 炒制","text":"我们家炒见手青，香味真不是靠调料堆出来的。每一锅先用黑猪肥肉慢慢炼油，再下见手青大火翻炒。再加云南独头大蒜、皱皮青椒一起炒，蒜香、辣香、菌香全都出来了。"},{"id":"QW-V12-055","source":"真实朋友圈","category":"产品特色","sku":"通用","keywords":"猪油, 黑土猪, 原材料","text":"这个就是我们炒菌用的猪油，出自山里散养的大黑土猪。只有原材料品质好，炒出来的味道才好。"},{"id":"QW-V12-056","source":"真实轻改","category":"产品特色","sku":"通用","keywords":"猪板油, 独头蒜, 一朵一朵挑","text":"挑菌子我要一朵一朵看，油只用自己买的猪板油现炼，大蒜只用没剥皮的独头蒜，我们自己剥。也许这些小细节不起眼，但我硬是靠这些细节把招牌做起来了。"},{"id":"QW-V12-057","source":"真实朋友圈","category":"产品特色","sku":"白葱","keywords":"白葱, 生菌, 熟菌, 颜色变化","text":"图1是刚洗完切好的生菌，颜色浅奶白；图2是刚炒好出锅的熟菌，会变成嫩黄色；图3是冷却后冻好的白葱，会氧化成黄黑色。原材料、炒制、成品，我都敢拍出来给大家看。"},{"id":"QW-V12-058","source":"待人工确认","category":"产品特色","sku":"私人定制","keywords":"不吃蒜, 单独开锅, 定制","text":"有没有客户不吃蒜的？下午准备单独开火炒一锅不放蒜的。锅要洗干净哈，就是一点蒜味都不能有的那种。"},{"id":"QW-V12-059","source":"真实轻改","category":"产品特色","sku":"干巴菌","keywords":"干巴菌, 手工清洗, 没沙, 不掺假","text":"我们家的干巴菌人工清洗，缝里的泥沙一点点挑，基本没沙。干巴菌市场里也有掺假降低成本的，假的一斤才几十块。这个事情我改变不了，只能把自己手上的洗干净、不掺假。"},{"id":"QW-V12-060","source":"真实朋友圈","category":"产品特色","sku":"通用","keywords":"山里, 采菌, 松针, 菌子窝","text":"今天来山上拉菌子，顺便跟着采菌子。自己真的很难找，基本都被松针盖着。不过菌子也有菌子窝，经常捡菌子的人能寻着窝找过去，我就是跟在后面捡现成的了。"}];
const CATS=['上新开卖','日常种草','信任人设','产品特色'],KEY='qw-moments-used-v12';
let category=CATS[0],query='',used=new Set(loadUsed()),currentId=null,historyIds=[],historyPos=-1;
const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function loadUsed(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function saveUsed(){try{localStorage.setItem(KEY,JSON.stringify([...used]))}catch(e){}}
function hay(x){return [x.text,x.sku,x.category,x.keywords,x.id].join(' ').toLowerCase()}
function pool(includeUsed=false){const q=query.trim().toLowerCase();return copyData.filter(x=>x.category===category&&(includeUsed||!used.has(x.id))&&(!q||hay(x).includes(q)))}
function randomFrom(rows,avoid){if(!rows.length)return null;let choices=rows.filter(x=>x.id!==avoid);if(!choices.length)choices=rows;return choices[Math.floor(Math.random()*choices.length)]}
function renderCategories(){categories.innerHTML=CATS.map(x=>`<button class="cat ${x===category?'active':''}" data-cat="${x}" aria-pressed="${x===category}">${x}</button>`).join('');categories.querySelectorAll('[data-cat]').forEach(button=>button.onclick=()=>{category=button.dataset.cat;historyIds=[];historyPos=-1;renderCategories();visit(randomFrom(pool(),null)?.id)})}
function visit(id,record=true){currentId=id||null;if(record&&id){historyIds=historyIds.slice(0,historyPos+1);historyIds.push(id);historyPos=historyIds.length-1}renderCard()}
function renderCard(){const rows=pool();let item=copyData.find(x=>x.id===currentId);const q=query.trim().toLowerCase();if(!item||item.category!==category||used.has(item.id)||(q&&!hay(item).includes(q))){item=randomFrom(rows,currentId);currentId=item?.id||null;if(item){historyIds=[item.id];historyPos=0}}if(!item){cardHost.innerHTML=`<div class="card empty">${query?'当前分类没有，试试切换分类':'这一类已经全部用过了，可以在下方恢复已用文案'}</div>`;return}const countLabel=query?`当前搜索 ${rows.length} 条`:`本类可用 ${rows.length} 条`;cardHost.innerHTML=`<article class="card" data-id="${item.id}"><div class="meta"><span class="tag">${item.category}</span><span class="tag">${item.sku}</span><span class="tag source">${item.source}</span></div><div class="text">${esc(item.text)}</div><div class="statusline"><span>${countLabel}</span><span>${item.id}</span></div><div class="actions"><button id="copyUse" class="btn primary">复制并标记已用</button><button id="swap" class="btn secondary">换一条</button><button id="previous" class="btn" ${historyPos<=0?'disabled':''}>上一条</button></div></article>`;$('#copyUse').onclick=copyAndUse;$('#swap').onclick=swapOne;$('#previous').onclick=previousOne}
function swapOne(){const rows=pool();if(rows.length<=1){toast('当前条件下只有这一条');return}visit(randomFrom(rows,currentId).id)}
function previousOne(){if(historyPos<=0)return;historyPos--;currentId=historyIds[historyPos];renderCard()}
async function writeClipboard(text){if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);return true}catch(e){}}try{const box=document.createElement('textarea');box.value=text;box.style.position='fixed';box.style.left='-9999px';document.body.appendChild(box);box.focus();box.select();const ok=document.execCommand('copy');box.remove();return ok}catch(e){return false}}
async function copyAndUse(){const item=copyData.find(x=>x.id===currentId);if(!item)return;const ok=await writeClipboard(item.text);if(!ok){toast('复制失败，请手动复制正文');return}used.add(item.id);saveUsed();historyIds=historyIds.filter(id=>!used.has(id));historyPos=historyIds.length-1;updateCounts();renderUsed();toast('已复制，已标记已用');const next=randomFrom(pool(),item.id);setTimeout(()=>visit(next?.id||null),450)}
function updateCounts(){usedTop.textContent=usedSummary.textContent=used.size;totalTop.textContent=copyData.length}
function renderUsed(){const rows=copyData.filter(x=>used.has(x.id));usedList.innerHTML=rows.length?rows.map(x=>`<div class="used-item"><div class="used-meta">${x.id} · ${x.category} · ${x.sku}</div><div class="used-text">${esc(x.text)}</div><button class="btn small" data-restore="${x.id}">恢复这条</button></div>`).join(''):'<div class="used-meta">还没有已用文案。</div>';usedList.querySelectorAll('[data-restore]').forEach(button=>button.onclick=()=>{used.delete(button.dataset.restore);saveUsed();updateCounts();renderUsed();if(!currentId)visit(randomFrom(pool(),null)?.id);toast('已恢复')})}
function toast(text){feedback.textContent=text;feedback.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>feedback.classList.remove('show'),1300)}
const categories=$('#categories'),search=$('#search'),clearSearch=$('#clearSearch'),cardHost=$('#cardHost'),usedTop=$('#usedTop'),totalTop=$('#totalTop'),usedSummary=$('#usedSummary'),usedList=$('#usedList'),restoreAll=$('#restoreAll'),clearUsed=$('#clearUsed'),feedback=$('#feedback');
search.oninput=()=>{query=search.value;historyIds=[];historyPos=-1;visit(randomFrom(pool(),null)?.id)};
clearSearch.onclick=()=>{search.value='';query='';historyIds=[];historyPos=-1;visit(randomFrom(pool(),null)?.id);search.focus()};
restoreAll.onclick=()=>{used.clear();saveUsed();updateCounts();renderUsed();visit(randomFrom(pool(),null)?.id);toast('已恢复全部')};
clearUsed.onclick=()=>{if(confirm('清空已用记录并恢复全部文案？')){used.clear();saveUsed();updateCounts();renderUsed();visit(randomFrom(pool(),null)?.id);toast('已清空记录')}};
renderCategories();updateCounts();renderUsed();visit(randomFrom(pool(),null)?.id);
</script></body></html>
