cene":"新品上架","text":"师傅今年第一锅炒鸡枞菌开炒了！师傅一开锅，路过灶台的人都要多看两眼。每年一到这个时候，吃过的人比我还先记得。今年想先尝头一口的，可以来跟我说一声。菌子季总算开场，后面慢慢热闹起来。"},{"id":"QW-A-050","category":"上新开卖","sku":"炒鸡枞菌","scene":"下午种草","text":"炒鸡枞菌终于开始出锅了！炒鸡枞菌出锅的时候，最先馋到的是自家人。刚上市的时候最有菌子季的感觉，闻着都觉得夏天来了。先把消息放出来，省得大家天天催我😂。前面催过我的，这下不用再天天催啦😂。"},{"id":"QW-A-051","category":"上新开卖","sku":"炒鸡枞菌","scene":"晚上轻提醒","text":"今年这口炒鸡枞菌总算等到了！师傅一开锅，路过灶台的人都要多看两眼。今年开头慢了一点，好在该来的这一口还是来了。一直惦记这个品种的，现在可以来问问了。今年想先尝这一口的，可以开始惦记了。"},{"id":"QW-A-052","category":"上新开卖","sku":"炒鸡枞菌","scene":"现炒现发","text":"师傅今年第一锅炒鸡枞菌开炒了！炒鸡枞菌出锅的时候，最先馋到的是自家人。朋友圈刚露个影子，已经有人跑来问是不是可以吃了。今年想先尝头一口的，可以来跟我说一声。刚开季就是这种感觉，灶台一热人也跟着高兴。"},{"id":"QW-A-053","category":"上新开卖","sku":"炒鸡枞菌","scene":"上午预热","text":"炒鸡枞菌终于开始出锅了！师傅一开锅，路过灶台的人都要多看两眼。前面问过好几次的朋友，这回不用再干等了。先把消息放出来，省得大家天天催我😂。该来的终于来了，这句话今天说着最舒服。"},{"id":"QW-A-054","category":"上新开卖","sku":"炒鸡枞菌","scene":"老客激活","text":"今年这口炒鸡枞菌总算等到了！炒鸡枞菌出锅的时候，最先馋到的是自家人。家里已经开始洗菌、备料，灶台边一下子忙了起来。一直惦记这个品种的，现在可以来问问了。先给一直记着的人报个信，省得你们还在猜。"},{"id":"QW-A-055","category":"上新开卖","sku":"私人定制","scene":"下午种草","text":"今年的私人定制也开始接了！定制锅要提前把口味和备料讲清楚。前面问过定制的朋友，这回可以把自己家的口味说一说了。不着急也没事，后面按每天炒制的批次慢慢发。等了这么久，总算不是只闻消息不见菌了。"},{"id":"QW-A-056","category":"上新开卖","sku":"私人定制","scene":"晚上轻提醒","text":"想按自家口味做菌子的，可以开始说了！每家爱吃的口味不一样，先说明白再开锅。辣不辣、放不放蒜，先讲清楚再准备，做起来才不忙乱。菌子季总算开场了，后面一个品种一个品种来。"},{"id":"QW-A-057","category":"上新开卖","sku":"私人定制","scene":"现炒现发","text":"今年定制锅也重新开起来了！定制锅要提前把口味和备料讲清楚。定制不是从普通锅里随便分一点，要提前单独备料。等这一口的朋友，看到这里应该懂了哈。这名字一露面，懂这一口的人自然就明白了。"},{"id":"QW-A-058","category":"上新开卖","sku":"私人定制","scene":"上午预热","text":"今年的私人定制也开始接了！每家爱吃的口味不一样，先说明白再开锅。每家人口味不一样，能做的照实说，不能做的也不硬答应。不着急也没事，后面按每天炒制的批次慢慢发。我先把这个好消息放出来，后面跟着每天的炒制走。"},{"id":"QW-A-059","category":"上新开卖","sku":"私人定制","scene":"老客激活","text":"想按自家口味做菌子的，可以开始说了！定制锅要提前把口味和备料讲清楚。今年想给家里单独做一锅的，现在可以开始商量口味了。菌子季总算开场了，后面一个品种一个品种来。"},{"id":"QW-A-060","category":"上新开卖","sku":"私人定制","scene":"新品上架","text":"今年定制锅也重新开起来了！每家爱吃的口味不一样，先说明白再开锅。定制锅重新开起来，前面的准备活也跟着多起来了。等这一口的朋友，看到这里应该懂了哈。这下总算不是只听消息，嘴巴也有盼头了。"},{"id":"QW-B-001","category":"日常种草","sku":"白葱","scene":"日常记录","text":"白葱刚出锅，青椒蒜片还在滋滋响。本来只盛一碗，吃到一半又跑去添了半碗。看到这一盘，估计下午又有人要敲我了😂。这一盘不需要摆得多漂亮，端上桌就知道有多香。本来嘴上说不饿，最后收碗的人还是我。"},{"id":"QW-B-002","category":"日常种草","sku":"白葱","scene":"上午预热","text":"今天午饭炒白葱，锅盖一开满屋子都是香的。本来饭煮得够，端上这盘以后突然就不够了。等这一口的朋友，今天可以认真看一眼了。本来嘴上说不饿，最后收碗的人还是我。饭桌上突然没人讲话，一看都在低头夹菜。"},{"id":"QW-B-003","category":"日常种草","sku":"白葱","scene":"下午种草","text":"这盘白葱才端上桌，筷子已经全伸过来了。看图片可能没感觉，坐在锅边真的忍不住。不催大家买，我只负责把你们看饿😂。饭桌上突然没人讲话，一看都在低头夹菜。云南人的夏天嘛，总有几顿饭是被菌子香醒的。"},{"id":"QW-B-004","category":"日常种草","sku":"白葱","scene":"晚上轻提醒","text":"晚饭白葱刚炒好，米饭先遭殃了。一口菜一口饭，回过神碗已经空了。这一口等了一年，吃到嘴里才算数。云南人的夏天嘛，总有几顿饭是被菌子香醒的。看图可能还忍得住，坐在锅边是真的忍不住。"},{"id":"QW-B-005","category":"日常种草","sku":"白葱","scene":"现炒现发","text":"中午这一锅白葱油亮亮的，汤汁往饭上一拌太狠了。说好只尝两口，最后米饭和菜一起扫干净。今晚吃什么不知道的，看完估计有答案了。看图可能还忍得住，坐在锅边是真的忍不住。"},{"id":"QW-B-006","category":"日常种草","sku":"白葱","scene":"日常记录","text":"白葱刚出锅，青椒蒜片还在滋滋响。这顿没有什么漂亮摆盘，胜在真的太下饭。这盘上桌以后，其他菜突然都没人夹了。今天米饭煮少了，这个错误下次一定改😂。我先不回消息，盘子里这几筷子比较要紧。"},{"id":"QW-B-007","category":"日常种草","sku":"白葱","scene":"上午预热","text":"今天午饭炒白葱，锅盖一开满屋子都是香的。第一碗吃得太快，第二碗才想起来慢慢吃。云南人的菌子季，饭桌上就是这么热闹。我先不回消息，盘子里这几筷子比较要紧。再写下去饭要凉了，我先吃完这碗再说。"},{"id":"QW-B-008","category":"日常种草","sku":"白葱","scene":"下午种草","text":"这盘白葱才端上桌，筷子已经全伸过来了。饭桌上一下安静了，只听见大家埋头干饭。今天不讲别的，先认真把这碗饭吃完。再写下去饭要凉了，我先吃完这碗再说。照片拍完筷子就开动，慢一点盘子都要空。"},{"id":"QW-B-009","category":"日常种草","sku":"白葱","scene":"晚上轻提醒","text":"晚饭白葱刚炒好，米饭先遭殃了。吃菌子就是这样，香起来谁还顾得上聊天。本来想留到下一顿，看样子是留不住了。照片拍完筷子就开动，慢一点盘子都要空。今天这顿别的菜都成了陪衬，米饭倒是添得快。"},{"id":"QW-B-010","category":"日常种草","sku":"白葱","scene":"现炒现发","text":"中午这一锅白葱油亮亮的，汤汁往饭上一拌太狠了。刚才还说不饿，闻到以后马上端碗坐下。锅里还有一点，我先去把它解决了。今天这顿别的菜都成了陪衬，米饭倒是添得快。减肥先放一边，这个时候忍住才奇怪。"},{"id":"QW-B-011","category":"日常种草","sku":"白葱","scene":"日常记录","text":"白葱刚出锅，青椒蒜片还在滋滋响。今天这顿值了，下午想起来嘴巴都还是馋的。减肥的事情明天再说，今天先狠狠干饭。减肥先放一边，这个时候忍住才奇怪。锅里还剩一点，我已经先替下一碗饭留好了。"},{"id":"QW-B-012","category":"日常种草","sku":"白葱","scene":"上午预热","text":"今天午饭炒白葱，锅盖一开满屋子都是香的。嘴上说少吃点，筷子伸得一个比一个快。家里爱吃菌子的，看到这里应该已经饿了。锅里还剩一点，我已经先替下一碗饭留好了。这一盘不需要摆得多漂亮，端上桌就知道有多香。"},{"id":"QW-B-013","category":"日常种草","sku":"白葱","scene":"下午种草","text":"这盘白葱才端上桌，筷子已经全伸过来了。我还没拍完，旁边已经催着快点开饭了。我先不回消息，手上这碗饭比较要紧。这一盘不需要摆得多漂亮，端上桌就知道有多香。本来嘴上说不饿，最后收碗的人还是我。"},{"id":"QW-B-014","category":"日常种草","sku":"白葱","scene":"晚上轻提醒","text":"晚饭白葱刚炒好，米饭先遭殃了。一家人围着吃，最后盘底那点汤汁都没有放过。这会儿发朋友圈有点坏，正好赶上饭点。本来嘴上说不饿，最后收碗的人还是我。饭桌上突然没人讲话，一看都在低头夹菜。"},{"id":"QW-B-015","category":"日常种草","sku":"白葱","scene":"现炒现发","text":"中午这一锅白葱油亮亮的，汤汁往饭上一拌太狠了。锅里剩的那一点都有人惦记，差点把锅刮干净。照片先拍到这里，再拍下去菜都要凉了。饭桌上突然没人讲话，一看都在低头夹菜。"},{"id":"QW-B-016","category":"日常种草","sku":"干巴菌","scene":"日常记录","text":"今天炒干巴菌，锅里刚翻两下整个屋子都是味。刚才还说不饿，闻到以后马上端碗坐下。家里爱吃菌子的，看到这里应该已经饿了。云南人的夏天嘛，总有几顿饭是被菌子香醒的。看图可能还忍得住，坐在锅边是真的忍不住。"},{"id":"QW-B-017","category":"日常种草","sku":"干巴菌","scene":"上午预热","text":"干巴菌炒饭刚端上来，我先把减肥忘了。今天这顿值了，下午想起来嘴巴都还是馋的。我先不回消息，手上这碗饭比较要紧。看图可能还忍得住，坐在锅边是真的忍不住。今天米饭煮少了，这个错误下次一定改😂。"},{"id":"QW-B-018","category":"日常种草","sku":"干巴菌","scene":"下午种草","text":"青椒干巴菌一上桌，米饭突然就不够分了。嘴上说少吃点，筷子伸得一个比一个快。这会儿发朋友圈有点坏，正好赶上饭点。今天米饭煮少了，这个错误下次一定改😂。我先不回消息，盘子里这几筷子比较要紧。"},{"id":"QW-B-019","category":"日常种草","sku":"干巴菌","scene":"晚上轻提醒","text":"中午这一盘干巴菌，看着不起眼，拌饭是真的狠。我还没拍完，旁边已经催着快点开饭了。照片先拍到这里，再拍下去菜都要凉了。我先不回消息，盘子里这几筷子比较要紧。再写下去饭要凉了，我先吃完这碗再说。"},{"id":"QW-B-020","category":"日常种草","sku":"干巴菌","scene":"现炒现发","text":"晚饭本来只想随便吃点，干巴菌一炒直接又添饭。一家人围着吃，最后盘底那点汤汁都没有放过。看到这一盘，估计下午又有人要敲我了😂。再写下去饭要凉了，我先吃完这碗再说。"},{"id":"QW-B-021","category":"日常种草","sku":"干巴菌","scene":"日常记录","text":"今天炒干巴菌，锅里刚翻两下整个屋子都是味。锅里剩的那一点都有人惦记，差点把锅刮干净。等这一口的朋友，今天可以认真看一眼了。照片拍完筷子就开动，慢一点盘子都要空。"},{"id":"QW-B-022","category":"日常种草","sku":"干巴菌","scene":"上午预热","text":"干巴菌炒饭刚端上来，我先把减肥忘了。本来只盛一碗，吃到一半又跑去添了半碗。不催大家买，我只负责把你们看饿😂。今天这顿别的菜都成了陪衬，米饭倒是添得快。减肥先放一边，这个时候忍住才奇怪。"},{"id":"QW-B-023","category":"日常种草","sku":"干巴菌","scene":"下午种草","text":"青椒干巴菌一上桌，米饭突然就不够分了。本来饭煮得够，端上这盘以后突然就不够了。这一口等了一年，吃到嘴里才算数。减肥先放一边，这个时候忍住才奇怪。锅里还剩一点，我已经先替下一碗饭留好了。"},{"id":"QW-B-024","category":"日常种草","sku":"干巴菌","scene":"晚上轻提醒","text":"中午这一盘干巴菌，看着不起眼，拌饭是真的狠。看图片可能没感觉，坐在锅边真的忍不住。今晚吃什么不知道的，看完估计有答案了。锅里还剩一点，我已经先替下一碗饭留好了。"},{"id":"QW-B-025","category":"日常种草","sku":"干巴菌","scene":"现炒现发","text":"晚饭本来只想随便吃点，干巴菌一炒直接又添饭。一口菜一口饭，回过神碗已经空了。这盘上桌以后，其他菜突然都没人夹了。这一盘不需要摆得多漂亮，端 饭桌上就是这么热闹。这一盘不需要摆得多漂亮，端上桌就知道有多香。"},{"id":"QW-B-050","category":"日常种草","sku":"炒鸡枞菌","scene":"现炒现发","text":"炒鸡枞菌一热透，香味跑满屋，原来不饿的人也坐下了。本来饭煮得够，端上这盘以后突然就不够了。今天不讲别的，先认真把这碗饭吃完。本来嘴上说不饿，最后收碗的人还是我。"},{"id":"QW-B-051","category":"日常种草","sku":"炒鸡枞菌","scene":"日常记录","text":"炒鸡枞菌刚复热好，盘子还烫手，大家已经围过来了。看图片可能没感觉，坐在锅边真的忍不住。本来想留到下一顿，看样子是留不住了。饭桌上突然没人讲话，一看都在低头夹菜。"},{"id":"QW-B-052","category":"日常种草","sku":"炒鸡枞菌","scene":"上午预热","text":"今天午饭就靠这盘炒鸡枞菌，米饭遭殃得很彻底。一口菜一口饭，回过神碗已经空了。锅里还有一点，我先去把它解决了。云南人的夏天嘛，总有几顿饭是被菌子香醒的。看图可能还忍得住，坐在锅边是真的忍不住。"},{"id":"QW-B-053","category":"日常种草","sku":"炒鸡枞菌","scene":"下午种草","text":"师傅刚炒好的鸡枞菌端上桌，减肥又失败了。说好只尝两口，最后米饭和菜一起扫干净。减肥的事情明天再说，今天先狠狠干饭。看图可能还忍得住，坐在锅边是真的忍不住。今天米饭煮少了，这个错误下次一定改😂。"},{"id":"QW-B-054","category":"日常种草","sku":"炒鸡枞菌","scene":"晚上轻提醒","text":"晚饭这盘炒鸡枞菌还冒热气，筷子根本停不下来。这顿没有什么漂亮摆盘，胜在真的太下饭。家里爱吃菌子的，看到这里应该已经饿了。今天米饭煮少了，这个错误下次一定改😂。我先不回消息，盘子里这几筷子比较要紧。"},{"id":"QW-B-055","category":"日常种草","sku":"炒鸡枞菌","scene":"现炒现发","text":"炒鸡枞菌一热透，香味跑满屋，原来不饿的人也坐下了。第一碗吃得太快，第二碗才想起来慢慢吃。我先不回消息，手上这碗饭比较要紧。我先不回消息，盘子里这几筷子比较要紧。"},{"id":"QW-B-056","category":"日常种草","sku":"炒鸡枞菌","scene":"日常记录","text":"炒鸡枞菌刚复热好，盘子还烫手，大家已经围过来了。饭桌上一下安静了，只听见大家埋头干饭。这会儿发朋友圈有点坏，正好赶上饭点。再写下去饭要凉了，我先吃完这碗再说。照片拍完筷子就开动，慢一点盘子都要空。"},{"id":"QW-B-057","category":"日常种草","sku":"炒鸡枞菌","scene":"上午预热","text":"今天午饭就靠这盘炒鸡枞菌，米饭遭殃得很彻底。吃菌子就是这样，香起来谁还顾得上聊天。照片先拍到这里，再拍下去菜都要凉了。照片拍完筷子就开动，慢一点盘子都要空。今天这顿别的菜都成了陪衬，米饭倒是添得快。"},{"id":"QW-B-058","category":"日常种草","sku":"炒鸡枞菌","scene":"下午种草","text":"师傅刚炒好的鸡枞菌端上桌，减肥又失败了。刚才还说不饿，闻到以后马上端碗坐下。看到这一盘，估计下午又有人要敲我了😂。今天这顿别的菜都成了陪衬，米饭倒是添得快。减肥先放一边，这个时候忍住才奇怪。"},{"id":"QW-B-059","category":"日常种草","sku":"炒鸡枞菌","scene":"晚上轻提醒","text":"晚饭这盘炒鸡枞菌还冒热气，筷子根本停不下来。今天这顿值了，下午想起来嘴巴都还是馋的。等这一口的朋友，今天可以认真看一眼了。减肥先放一边，这个时候忍住才奇怪。锅里还剩一点，我已经先替下一碗饭留好了。"},{"id":"QW-B-060","category":"日常种草","sku":"炒鸡枞菌","scene":"现炒现发","text":"炒鸡枞菌一热透，香味跑满屋，原来不饿的人也坐下了。嘴上说少吃点，筷子伸得一个比一个快。不催大家买，我只负责把你们看饿😂。锅里还剩一点，我已经先替下一碗饭留好了。"},{"id":"QW-C-001","category":"信任人设","sku":"通用","scene":"安全提醒","text":"菌子季一忙起来，人累，脑子反而更清楚。真野生菌从收货、挑选到清洗处理，每一步都有成本，便宜到离谱的我自己都要打问号。我能做的就是把自己看到的、做到的照实讲。人忙一点、赚慢一点，晚上睡觉心里是安稳的。"},{"id":"QW-C-002","category":"信任人设","sku":"通用","scene":"客户反馈","text":"今天收到一句认真反馈，心里比收到夸奖还高兴。当季野生菌、去年冻货和人工菌不是一回事，可以各卖各的，但不能换个名字糊弄人。少赚一点心里踏实，这个觉也睡得安稳。这些话不是为了卖惨，是做久以后留下的实在想法。"},{"id":"QW-C-003","category":"信任人设","sku":"通用","scene":"成本解释","text":"有些话不好听，我还是想直接说。今天有什么就说什么，没有的品种不先答应，省得后面拿相近的货来顶。我能做的就是把自己看到的、做到的照实讲。朋友圈写得粗一点没事，话是真的就行。"},{"id":"QW-C-004","category":"信任人设","sku":"通用","scene":"日常记录","text":"每年开季我都会把同样的话再讲一遍。次一点的货价格确实便宜，可我们不想拿客户的嘴巴替自己试运气。少赚一点心里踏实，这个觉也睡得安稳。我话说得直，听着不漂亮，事情不能做得含糊。"},{"id":"QW-C-005","category":"信任人设","sku":"通用","scene":"晚上轻提醒","text":"当了妈妈以后，我对入口的东西更啰嗦了。我自己家敢吃、来源讲得清楚的，才愿意往外发，不靠一句放心把问题带过去。我能做的就是把自己看到的、做到的照实讲。生意慢一点没事，真假和来路不能跟着乱。"},{"id":"QW-C-006","category":"信任人设","sku":"通用","scene":"安全提醒","text":"菌子季一忙起来，人累，脑子反而更清楚。真野生菌从收货、挑选到清洗处理，每一步都有成本，便宜到离谱的我自己都要打问号。少赚一点心里踏实，这个觉也睡得安稳。今天少卖一单不要紧，明年见面还自在更重要。"},{"id":"QW-C-007","category":"信任人设","sku":"通用","scene":"客户反馈","text":"今天收到一句认真反馈，心里比收到夸奖还高兴。当季野生菌、去年冻货和人工菌不是一回事，可以各卖各的，但不能换个名字糊弄人。我能做的就是把自己看到的、做到的照实讲。"},{"id":"QW-C-008","category":"信任人设","sku":"通用","scene":"成本解释","text":"有些话不好听，我还是想直接说。今天有什么就说什么，没有的品种不先答应，省得后面拿相近的货来顶。少赚一点心里踏实，这个觉也睡得安稳。我能讲的都照实讲，不确定的地方也不会装懂。"},{"id":"QW-C-009","category":"信任人设","sku":"通用","scene":"日常记录","text":"每年开季我都会把同样的话再讲一遍。次一点的货价格确实便宜，可我们不想拿客户的嘴巴替自己试运气。我能做的就是把自己看到的、做到的照实讲。入口的东西，多问一句、多看一眼都不算麻烦。"},{"id":"QW-C-010","category":"信任人设","sku":"通用","scene":"晚上轻提醒","text":"当了妈妈以后，我对入口的东西更啰嗦了。我自己家敢吃、来源讲得清楚的，才愿意往外发，不靠一句放心把问题带过去。少赚一点心里踏实，这个觉也睡得安稳。大家可以买也可以不买，但该知道的事情不能瞒。"},{"id":"QW-C-011","category":"信任人设","sku":"通用","scene":"安全提醒","text":"菌子季一忙起来，人累，脑子反而更清楚。真野生菌从收货、挑选到清洗处理，每一步都有成本，便宜到离谱的我自己都要打问号。我能做的就是把自己看到的、做到的照实讲。外面怎么卷我管不了，自己手上的东西要对得起人。"},{"id":"QW-C-012","category":"信任人设","sku":"通用","scene":"客户反馈","text":"今天收到一句认真反馈，心里比收到夸奖还高兴。当季野生菌、去年冻货和人工菌不是一回事，可以各卖各的，但不能换个名字糊弄人。少赚一点心里踏实，这个觉也睡得安稳。我不怕大家比较，真货和假货先放在一条线上比。"},{"id":"QW-C-013","category":"信任人设","sku":"通用","scene":"成本解释","text":"有些话不好听，我还是想直接说。今天有什么就说什么，没有的品种不先答应，省得后面拿相近的货来顶。我能做的就是把自己看到的、做到的照实讲。人忙一点、赚慢一点，晚上睡觉心里是安稳的。"},{"id":"QW-C-01 051","category":"产品特色","sku":"红葱","scene":"日常记录","text":"看着只是一个小动作，天天做才晓得多费时间。红葱收回来先分品种、看状态，不拿相近见手青混在一起做。师傅说能偷懒的地方很多，但入口的东西不能偷懒。前面肯费工，后面装出去的时候心里才踏实。"},{"id":"QW-D-052","category":"产品特色","sku":"红葱","scene":"现炒现发","text":"这个步骤外人不一定注意，我们自己不敢省。熟制红葱要按确定的处理流程来，不能一边赶时间一边缩短步骤。该费的人工省不了，省了最后就是客户吃亏。这些活不显眼，真正天天做的人才晓得多磨人。"},{"id":"QW-D-053","category":"产品特色","sku":"红葱","scene":"日常记录","text":"有些活拍视频不好看，但一天都省不了。这个品种从挑选到炒制都要更谨慎，朋友圈里一句好吃代替不了实际流程。手上的活做到哪一步，我们就老老实实拍到哪一步。师傅说该慢的地方就得慢，急出来的活自己都看不上。"},{"id":"QW-D-054","category":"产品特色","sku":"红葱","scene":"现炒现发","text":"看着只是一个小动作，天天做才晓得多费时间。红葱收回来先分品种、看状态，不拿相近见手青混在一起做。师傅说能偷懒的地方很多，但入口的东西不能偷懒。从桌边忙到灶台边，前面的功夫一点都不少。"},{"id":"QW-D-055","category":"产品特色","sku":"黄牛肝","scene":"日常记录","text":"今天衣服上又是一身油味，手上还是蒜味。黄牛肝按实际货源分开放，地方名字相近也不能混成一筐处理。手上的活做到哪一步，我们就老老实实拍到哪一步。不是机器一按就出来，哪一步都有人盯着、有人做。"},{"id":"QW-D-056","category":"产品特色","sku":"黄牛肝","scene":"现炒现发","text":"今天又在后厨看到一个不起眼的小细节。牛肝菌先分清品种和状态，再进入后面的清洗切配，不拿颜色替代判断。师傅说能偷懒的地方很多，但入口的东西不能偷懒。差一点的挑出去不心疼，混进锅里才真叫心疼。"},{"id":"QW-D-057","category":"产品特色","sku":"黑牛肝","scene":"现炒现发","text":"今天师傅还没开火，我们先忙了半天。黑牛肝野生与栽培相关货源不能混着讲，进货时来源就要先记清楚。前面认真一点，后面发出去心里才踏实。细节说多了像啰嗦，亲眼看一天就都明白了。"},{"id":"QW-D-058","category":"产品特色","sku":"黑牛肝","scene":"日常记录","text":"后厨忙起来谁也不说漂亮话，手上不停就对了。同样叫黑牛肝的货也要按实际品种分开，不为省事混批处理。这些活不漂亮，却最能说明我们每天在做什么。今天把这个过程记一下，成品背后的活也该让人看见。"},{"id":"QW-D-059","category":"产品特色","sku":"私人定制","scene":"日常记录","text":"一盘熟制菌子背后，真不是倒进锅里翻两下。定制单要提前确认口味、配料、单独炒制和包装，不能临时从普通锅里分一点出来。该费的人工省不了，省了最后就是客户吃亏。手上的事情做细一点，比嘴上讲十遍都有用。"},{"id":"QW-D-060","category":"产品特色","sku":"私人定制","scene":"现炒现发","text":"朋友圈里看到的是成品，灶台前面可没这么轻松。不辣、不放蒜这些要求要在备料前说清楚，做的时候才不会手忙脚乱。手上的活做到哪一步，我们就老老实实拍到哪一步。成品装进袋子以前，这些小活一项都绕不过去。"}];
const categories=['全部','上新开卖','日常种草','信任人设','产品特色'];
const skus=['全部','通用','红葱','白葱','干巴菌','牛肝','奶浆菌','鸡枞油','炒鸡枞菌','私人定制'];
const slotRules=[{name:'上午参考',cats:['上新开卖','信任人设']},{name:'下午参考',cats:['日常种草','产品特色']},{name:'晚上参考',cats:['信任人设','产品特色','上新开卖']}];
const KEY='qw-moments-used-v1';let cat='全部',sku='全部',used=new Set(safeLoad()),slots=[],libraryOffset=0;
const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function safeLoad(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}function save(){localStorage.setItem(KEY,JSON.stringify([...used]))}function active(){return copyData.filter(x=>!used.has(x.id))}function skuOk(x){return sku==='全部'||x.sku===sku||(sku==='牛肝'&&['黄牛肝','黑牛肝'].includes(x.sku))}
function chips(){categoryFilters.innerHTML=categories.map(x=>`<button class="chip ${cat===x?'active':''}" data-cat="${x}">${x}</button>`).join('');skuFilters.innerHTML=skus.map(x=>`<button class="chip ${sku===x?'active':''}" data-sku="${x}">${x}</button>`).join('');document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;libraryOffset=0;render()});document.querySelectorAll('[data-sku]').forEach(b=>b.onclick=()=>{sku=b.dataset.sku;libraryOffset=0;render()})}
function card(x,slot='',swap=false){if(!x)return`<div class="empty">暂无未使用文案，可以到已用管理里恢复。</div>`;return`<article class="card" data-id="${x.id}">${slot?`<div class="slot">${slot}</div>`:''}<div class="meta"><span class="tag">${x.category}</span><span class="tag">${x.sku}</span><span class="tag">${x.scene}</span></div><div class="text">${esc(x.text)}</div><div class="id">${x.id}</div><div class="actions"><button class="btn primary" data-copy="${x.id}">复制正文</button><button class="btn soft" data-swap="${x.id}" data-kind="${swap?'slot':'library'}">换一条</button><button class="btn used" data-used="${x.id}">标记已用</button></div></article>`}
function choose(cats,exclude=[]){let p=active().filter(x=>cats.includes(x.category)&&!exclude.includes(x.id));if(!p.length)p=active().filter(x=>!exclude.includes(x.id));return p[Math.floor(Math.random()*p.length)]}
function recommendations(){slotRules.forEach((r,i)=>{if(!copyData.some(x=>x.id===slots[i]&&!used.has(x.id)))slots[i]=choose(r.cats,slots.filter(Boolean))?.id});recommend.innerHTML=slotRules.map((r,i)=>card(copyData.find(x=>x.id===slots[i]),r.name,true)).join('')}
function library(){let rows=active().filter(x=>(cat==='全部'||x.category===cat)&&skuOk(x));if(rows.length&&libraryOffset)rows=rows.slice(libraryOffset).concat(rows.slice(0,libraryOffset));resultCount.textContent=`当前 ${rows.length} 条`;libraryEl.innerHTML=rows.length?rows.map(x=>card(x)).join(''):`<div class="empty">当前条件下暂无可用文案，可以换个主题或 SKU。</div>`}
function usedList(){let rows=copyData.filter(x=>used.has(x.id));usedCount.textContent=topUsedCount.textContent=rows.length;availableCount.textContent=copyData.length-rows.length;usedListEl.innerHTML=rows.length?rows.map(x=>`<div class="used-item"><div class="id">${x.id} · ${x.category} · ${x.sku}</div><div class="text">${esc(x.text)}</div><button class="btn" data-restore="${x.id}">单条恢复</button></div>`).join(''):`<div class="hint">还没有标记已用的文案。</div>`}
function render(){chips();recommendations();library();usedList();bind()}
function bind(){document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copyText(b.dataset.copy,b));document.querySelectorAll('[data-used]').forEach(b=>b.onclick=()=>mark(b.dataset.used));document.querySelectorAll('[data-swap]').forEach(b=>b.onclick=()=>swap(b));document.querySelectorAll('[data-restore]').forEach(b=>b.onclick=()=>restore(b.dataset.restore))}
async function copyText(id,b){let x=copyData.find(v=>v.id===id),ok=false;try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(x.text);ok=true}}catch(e){}if(!ok){try{let t=document.createElement('textarea');t.value=x.text;t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.focus();t.select();ok=document.execCommand('copy');t.remove()}catch(e){}}if(ok){let old=b.textContent;b.textContent='已复制';b.closest('.card')?.classList.add('flash');toast('已复制正文');setTimeout(()=>{b.textContent=old;b.closest('.card')?.classList.remove('flash')},1200)}else toast('复制失败，请手动复制')}
function mark(id){used.add(id);save();slots=slots.map(x=>x===id?null:x);render();toast('已标记使用')}
function swap(b){if(b.dataset.kind==='slot'){let i=slots.indexOf(b.dataset.swap);slots[i]=choose(slotRules[i].cats,slots.filter(Boolean).concat(b.dataset.swap))?.id}else{let n=active().filter(x=>(cat==='全部'||x.category===cat)&&skuOk(x)).length;libraryOffset=n?(libraryOffset+1)%n:0}render()}
function restore(id){used.delete(id);save();render();toast('已恢复')}
function toast(t){let e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),1300)}
const categoryFilters=$('#categoryFilters'),skuFilters=$('#skuFilters'),recommend=$('#recommend'),libraryEl=$('#library'),usedListEl=$('#usedList'),usedCount=$('#usedCount'),topUsedCount=$('#topUsedCount'),availableCount=$('#availableCount'),resultCount=$('#resultCount'),restoreAll=$('#restoreAll'),clearUsed=$('#clearUsed');
restoreAll.onclick=()=>{used.clear();save();render();toast('已恢复全部')};clearUsed.onclick=()=>{if(confirm('清空已用记录并恢复全部文案？')){used.clear();save();render();toast('已清空记录')}};render();
</script></body></html>
