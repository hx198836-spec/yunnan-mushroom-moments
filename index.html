<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>企微朋友圈</title><style>
:root{--bg:#f6f0e5;--paper:#fffdf8;--ink:#342820;--muted:#806f61;--brown:#965534;--brown-dark:#713b24;--green:#647b5a;--green-soft:#e9efe3;--line:#dfd2bf;--shadow:rgba(79,55,35,.1)}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;color:var(--ink);background:radial-gradient(circle at 15% 0,#fff9ee 0,transparent 35%),linear-gradient(145deg,#f7f1e7,#f2ede3);font:16px/1.65 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}.wrap{width:min(720px,100%);margin:auto;padding:14px 16px 44px}.top{display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:3px 2px 12px}h1{font-size:24px;line-height:1.2;margin:0;letter-spacing:.04em}.used-count{color:var(--muted);font-size:13px;white-space:nowrap}.used-count b{font-size:15px;color:var(--brown-dark)}
.version-note{margin:-4px 2px 9px;color:var(--muted);font-size:12px}.categories{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 11px}.cat{appearance:none;border:1px solid var(--line);border-radius:12px;background:rgba(255,253,248,.8);color:var(--ink);font:700 15px/1.25 inherit;min-height:44px;padding:8px 5px;cursor:pointer;transition:.16s}.cat:hover{border-color:#caa98f}.cat.active{background:var(--brown);border-color:var(--brown);color:#fff;box-shadow:0 5px 14px rgba(150,85,52,.17)}
.search-wrap{position:relative}.search{width:100%;height:46px;border:1px solid var(--line);border-radius:13px;background:#fffefa;color:var(--ink);font-size:15px;padding:0 42px 0 14px;outline:none}.search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(100,123,90,.12)}.clear{position:absolute;right:7px;top:6px;width:34px;height:34px;border:0;border-radius:50%;background:transparent;color:var(--muted);font-size:20px;cursor:pointer}
.card{position:relative;margin-top:13px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:19px 20px 18px;box-shadow:0 12px 30px var(--shadow)}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}.tag{font-size:12px;line-height:1.5;color:var(--green);background:var(--green-soft);padding:3px 9px;border-radius:999px}.tag.source{color:var(--brown-dark);background:#f3e7dc}.text{white-space:pre-wrap;font-size:18px;line-height:1.82;min-height:150px;max-height:310px;overflow:auto;overscroll-behavior:contain;margin:10px 0 12px;padding-right:3px}.text::-webkit-scrollbar{width:5px}.text::-webkit-scrollbar-thumb{background:#d5c5b2;border-radius:9px}.statusline{display:flex;justify-content:space-between;gap:8px;border-top:1px dashed var(--line);padding-top:10px;color:var(--muted);font-size:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}.btn{appearance:none;border:1px solid var(--line);background:#fffefa;color:var(--ink);border-radius:12px;min-height:44px;padding:8px 12px;font-size:15px;cursor:pointer}.btn.primary{grid-column:1/-1;background:var(--brown);border-color:var(--brown);color:#fff;font-weight:800;min-height:52px;font-size:16px;box-shadow:0 6px 15px rgba(150,85,52,.15)}.btn.secondary{color:var(--green);font-weight:700}.btn:disabled{opacity:.4;cursor:not-allowed}.empty{min-height:230px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted)}
details{margin-top:14px;border-top:1px solid rgba(150,85,52,.15);padding-top:4px}summary{cursor:pointer;color:var(--muted);font-weight:700;padding:10px 2px}.used-tools{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 9px}.btn.small{min-height:36px;padding:5px 10px;font-size:13px;color:var(--muted)}.used-list{display:grid;gap:7px}.used-item{background:rgba(255,253,248,.82);border:1px solid var(--line);border-radius:12px;padding:11px}.used-meta{font-size:11px;color:var(--muted)}.used-text{font-size:13px;line-height:1.6;margin:5px 0 8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.feedback{position:fixed;z-index:10;left:50%;bottom:22px;transform:translate(-50%,10px);background:#352920;color:#fff;padding:10px 16px;border-radius:11px;opacity:0;pointer-events:none;transition:.18s;white-space:nowrap}.feedback.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:600px){.wrap{padding:10px 11px 34px}.top{padding-bottom:8px}h1{font-size:22px}.categories{grid-template-columns:1fr 1fr;gap:7px;margin:6px 0 9px}.cat{min-height:41px;font-size:14px}.search{height:44px;font-size:14px}.card{margin-top:10px;padding:16px 15px 15px;border-radius:16px}.text{font-size:17px;line-height:1.75;min-height:130px;max-height:32vh}.actions{margin-top:11px}.btn.primary{min-height:49px}.used-count{font-size:12px}}@media(max-width:360px){.actions{grid-template-columns:1fr}.btn.primary{grid-column:auto}}
</style></head><body><main class="wrap">
<header class="top"><h1>企微朋友圈</h1><div class="used-count">可发 <b id="totalTop">0</b> 条 · 已用 <b id="usedTop">0</b></div></header>
<div class="version-note">V1.3 安全可发版：先放少量高质量草稿，后续再人工补充。</div>
<nav id="categories" class="categories" aria-label="朋友圈分类"></nav>
<div class="search-wrap"><input id="search" class="search" type="search" autocomplete="off" placeholder="搜索关键词：红葱、干巴菌、鸡枞、牛肝、板油、蒜、价格、冻货"><button id="clearSearch" class="clear" aria-label="清空搜索">×</button></div>
<section id="cardHost" aria-live="polite"></section>
<details id="usedPanel"><summary>已用管理（<span id="usedSummary">0</span>）</summary><div class="used-tools"><button id="restoreAll" class="btn small">恢复全部</button><button id="clearUsed" class="btn small">清空已用记录</button></div><div id="usedList" class="used-list"></div></details>
<details id="pendingPanel"><summary>待确认文案（<span id="pendingSummary">0</span>）</summary><div class="used-meta">待确认、需改 SKU 和禁用文案不会进入默认抽卡。</div></details>
</main><div id="feedback" class="feedback" role="status"></div><script>
const copyData=[{"id":"QW-V13-001","category":"上新开卖","sku":"通用","keywords":"开季, 预热, 云南野生菌","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"最近问菌子的人一下多了起来，我一看聊天框就知道，大家又开始惦记云南这一口了。先给等着的朋友报个到，有确定消息我再来喊。"},{"id":"QW-V13-002","category":"上新开卖","sku":"通用","keywords":"雨季, 开季, 忙碌","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"每年到这个时候，家里人说话都绕不开菌子：雨下得够不够，山上有没有动静。围裙已经找出来了，接下来什么时候忙，就看老天爷给不给力啦。"},{"id":"QW-V13-003","category":"上新开卖","sku":"通用","keywords":"老朋友, 预热, 菌子季","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"今天先不卖东西，就问一句：去年吃过的朋友，今年还等着吗？天气一有变化，熟悉的名字就开始在微信里冒泡，我看着都觉得菌子季快有感觉了。"},{"id":"QW-V13-004","category":"上新开卖","sku":"通用","keywords":"云南, 下雨, 开季提醒","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"云南的雨一落，做菌子的人就有点坐不住了。家里开始收拾灶台、清点东西，嘴上说不急，心里其实天天都在等山上的消息。"},{"id":"QW-V13-005","category":"上新开卖","sku":"通用","keywords":"预热, 老朋友, 发圈提醒","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"朋友圈先冒个泡，免得一直等菌子的朋友以为我把这事忘了。没忘，年年到季节我比你们还着急，只是没有准信之前不敢乱讲。"},{"id":"QW-V13-006","category":"日常种草","sku":"通用","keywords":"午饭, 下饭, 添饭","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"午饭本来只盛了一碗，菌子一上桌又回去添了半碗。减肥的事先放一放，这种时候嘴巴比脑子诚实😂"},{"id":"QW-V13-007","category":"日常种草","sku":"通用","keywords":"刚出锅, 满屋子香, 饭桌","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"锅盖刚掀开，屋里的人全往厨房看。刚才还说不饿，等菜端出去，一个个筷子都伸得比谁都快。"},{"id":"QW-V13-008","category":"日常种草","sku":"通用","keywords":"晚饭, 米饭, 光盘","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"今晚这盘最先见底，旁边的菜都还没怎么动。菌子负责香，米饭负责遭殃，最后连盘子里的油都没舍得剩。"},{"id":"QW-V13-009","category":"日常种草","sku":"通用","keywords":"米线, 早饭, 菌子","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"早上烫一碗米线，舀点菌子进去，坐下来先呼噜几口。外面忙不忙先不管，肚子吃舒服了再说，云南人的早饭就是这么实在。"},{"id":"QW-V13-010","category":"日常种草","sku":"通用","keywords":"晚餐, 一锅, 家常","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"晚上不想弄一桌菜，有这一锅就够了。大家围着锅吃，开始还在聊天，后面只听见碗筷响，香不香根本不用问。"},{"id":"QW-V13-011","category":"信任人设","sku":"通用","keywords":"选货, 不乱碰, 老朋友","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"做菌子久了，见过的货多，怕的东西也多。有些看着便宜省事，我还是不碰。生意少做一点可以，不能让一直跟着我的朋友心里犯嘀咕。"},{"id":"QW-V13-012","category":"信任人设","sku":"通用","keywords":"老板娘, 心直口快, 实在","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"我这个人不会把话说得多漂亮，货行就说行，不合适就直接讲。做吃的东西，拐弯抹角没意思，大家相处久了自然知道我是什么脾气。"},{"id":"QW-V13-013","category":"信任人设","sku":"通用","keywords":"便宜货, 不糊弄, 来路","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"便宜的货不是没见过，真正让我犹豫的是它从哪里来、怎么处理过。入口的东西不能只盯着便宜，来路说不明白，再好看的我也不拿。"},{"id":"QW-V13-014","category":"信任人设","sku":"通用","keywords":"真货, 照片, 实物","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"有些货照片拍得漂亮，拿到手不一定是那么回事。我宁愿把真实样子给大家看，天然东西有点长短、颜色不同都正常，没必要装得十全十美。"},{"id":"QW-V13-015","category":"信任人设","sku":"通用","keywords":"长期生意, 信用, 做菌多年","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"这行做得越久，越不敢把生意当成一锤子买卖。东西卖出去很快，后面的口碑却要跟很多年。该守的地方松一次，前面做的都白费。"},{"id":"QW-V13-016","category":"产品特色","sku":"通用","keywords":"挑菌, 次货, 手工","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"今天桌上摆了一排菌子，好的往一边放，软的、坏的、老的直接挑出去。这个活看着不难，坐下来一直盯，眼睛和腰都受不了，但省不得。"},{"id":"QW-V13-017","category":"产品特色","sku":"干巴菌","keywords":"干巴菌, 手工清洗, 泥沙","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"干巴菌最磨人的不是炒，是洗。缝里夹着的泥和松针要一点点抠，水换了又换，洗到腰酸才敢往后面做。嫌麻烦的话，这个活真的干不下来。"},{"id":"QW-V13-018","category":"产品特色","sku":"通用","keywords":"独头蒜, 备料, 手工剥蒜","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"独头蒜买回来还不算完，要一颗颗剥。剥到后面手上全是蒜味，洗几遍都还有。成品里看着只是几片蒜，前面备料的人可一点没少忙。"},{"id":"QW-V13-019","category":"产品特色","sku":"通用","keywords":"黑猪板油, 炼油, 用料","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"板油切好下锅，火不能急，慢慢把油炼出来，香味才稳。这个步骤费时间，也容易被忽略，但炒菌子最后香不香，前面的油已经决定了一大半。"},{"id":"QW-V13-020","category":"产品特色","sku":"通用","keywords":"洗菌, 切菌, 炒菌, 流程","status":"可发","reference":"学习真实朋友圈语气，不复用原文","text":"一锅菌子端出来很快，前面却要挑、洗、切、备料，灶台边再守着炒。少做一步都轻松，可吃到嘴里的东西，还是老老实实按顺序来。"}];
const CATS=['上新开卖','日常种草','信任人设','产品特色'],KEY='qw-moments-used-v13';
let category=CATS[0],query='',used=new Set(loadUsed()),currentId=null,historyIds=[],historyPos=-1;
const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function loadUsed(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function saveUsed(){try{localStorage.setItem(KEY,JSON.stringify([...used]))}catch(e){}}
function hay(x){return [x.text,x.sku,x.category,x.keywords,x.id].join(' ').toLowerCase()}
function pool(includeUsed=false){const q=query.trim().toLowerCase();return copyData.filter(x=>x.category===category&&(includeUsed||!used.has(x.id))&&(!q||hay(x).includes(q)))}
function randomFrom(rows,avoid){if(!rows.length)return null;let choices=rows.filter(x=>x.id!==avoid);if(!choices.length)choices=rows;return choices[Math.floor(Math.random()*choices.length)]}
function renderCategories(){categories.innerHTML=CATS.map(x=>`<button class="cat ${x===category?'active':''}" data-cat="${x}" aria-pressed="${x===category}">${x}</button>`).join('');categories.querySelectorAll('[data-cat]').forEach(button=>button.onclick=()=>{category=button.dataset.cat;historyIds=[];historyPos=-1;renderCategories();visit(randomFrom(pool(),null)?.id)})}
function visit(id,record=true){currentId=id||null;if(record&&id){historyIds=historyIds.slice(0,historyPos+1);historyIds.push(id);historyPos=historyIds.length-1}renderCard()}
function renderCard(){const rows=pool();let item=copyData.find(x=>x.id===currentId);const q=query.trim().toLowerCase();if(!item||item.category!==category||used.has(item.id)||(q&&!hay(item).includes(q))){item=randomFrom(rows,currentId);currentId=item?.id||null;if(item){historyIds=[item.id];historyPos=0}}if(!item){cardHost.innerHTML=`<div class="card empty">${query?'当前分类没有，试试切换分类':'这一类已经全部用过了，可以在下方恢复已用文案'}</div>`;return}const countLabel=query?`当前搜索 ${rows.length} 条`:`本类可用 ${rows.length} 条`;cardHost.innerHTML=`<article class="card" data-id="${item.id}"><div class="meta"><span class="tag">${item.category}</span><span class="tag">${item.sku}</span></div><div class="text">${esc(item.text)}</div><div class="statusline"><span>${countLabel}</span><span>${item.id}</span></div><div class="actions"><button id="copyUse" class="btn primary">复制并标记已用</button><button id="swap" class="btn secondary">换一条</button><button id="previous" class="btn" ${historyPos<=0?'disabled':''}>上一条</button></div></article>`;$('#copyUse').onclick=copyAndUse;$('#swap').onclick=swapOne;$('#previous').onclick=previousOne}
function swapOne(){const rows=pool();if(rows.length<=1){toast('当前条件下只有这一条');return}visit(randomFrom(rows,currentId).id)}
function previousOne(){if(historyPos<=0)return;historyPos--;currentId=historyIds[historyPos];renderCard()}
async function writeClipboard(text){if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);return true}catch(e){}}try{const box=document.createElement('textarea');box.value=text;box.style.position='fixed';box.style.left='-9999px';document.body.appendChild(box);box.focus();box.select();const ok=document.execCommand('copy');box.remove();return ok}catch(e){return false}}
async function copyAndUse(){const item=copyData.find(x=>x.id===currentId);if(!item)return;const ok=await writeClipboard(item.text);if(!ok){toast('复制失败，请手动复制正文');return}used.add(item.id);saveUsed();historyIds=historyIds.filter(id=>!used.has(id));historyPos=historyIds.length-1;updateCounts();renderUsed();toast('已复制，已标记已用');const next=randomFrom(pool(),item.id);setTimeout(()=>visit(next?.id||null),450)}
function updateCounts(){usedTop.textContent=usedSummary.textContent=used.size;totalTop.textContent=copyData.length}
function renderUsed(){const rows=copyData.filter(x=>used.has(x.id));usedList.innerHTML=rows.length?rows.map(x=>`<div class="used-item"><div class="used-meta">${x.id} · ${x.category} · ${x.sku}</div><div class="used-text">${esc(x.text)}</div><button class="btn small" data-restore="${x.id}">恢复这条</button></div>`).join(''):'<div class="used-meta">还没有已用文案。</div>';usedList.querySelectorAll('[data-restore]').forEach(button=>button.onclick=()=>{used.delete(button.dataset.restore);saveUsed();updateCounts();renderUsed();if(!currentId)visit(randomFrom(pool(),null)?.id);toast('已恢复')})}
function toast(text){feedback.textContent=text;feedback.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>feedback.classList.remove('show'),1300)}
const categories=$('#categories'),search=$('#search'),clearSearch=$('#clearSearch'),cardHost=$('#cardHost'),usedTop=$('#usedTop'),totalTop=$('#totalTop'),usedSummary=$('#usedSummary'),usedList=$('#usedList'),restoreAll=$('#restoreAll'),clearUsed=$('#clearUsed'),feedback=$('#feedback');
search.oninput=()=>{query=search.value;historyIds=[];historyPos=-1;visit(randomFrom(pool(),null)?.id)};
clearSearch.onclick=()=>{search.value='';query='';historyIds=[];historyPos=-1;visit(randomFrom(pool(),null)?.id);search.focus()};
restoreAll.onclick=()=>{used.clear();saveUsed();updateCounts();renderUsed();visit(randomFrom(pool(),null)?.id);toast('已恢复全部')};
clearUsed.onclick=()=>{if(confirm('清空已用记录并恢复全部文案？')){used.clear();saveUsed();updateCounts();renderUsed();visit(randomFrom(pool(),null)?.id);toast('已清空记录')}};
renderCategories();updateCounts();renderUsed();visit(randomFrom(pool(),null)?.id);
</script></body></html>
