const copyData=[{"id":"QW-V14-001","category":"上新开卖","sku":"黄牛肝","keywords":"黄牛肝, 牛肝菌, 新品预热","status":"可发","reference":"ChatGPT人工撰写","text":"黄牛肝后面会接上。我们家一直在收这类菌子，等山上这阵子的品质稳定、量也起来，就会集中炒一锅。喜欢牛肝菌厚实口感的，先吱一声，我看看今年等它的人多不多。"},{"id":"QW-V14-002","category":"上新开卖","sku":"黄牛肝","keywords":"黄牛肝, 牛肝菌, 山货","status":"可发","reference":"ChatGPT人工撰写","text":"这两天牛肝菌开始有动静了。黄牛肝不是零星几朵就开锅，要凑到一批像样的货，炒出来才有那个香。想等这一口的，下面点个赞，我后面好提醒。"},{"id":"QW-V14-003","category":"上新开卖","sku":"黄牛肝","keywords":"黄牛肝, 牛肝菌, 口感","status":"可发","reference":"ChatGPT人工撰写","text":"黄牛肝吃起来是肉厚、菌香足的那种。后面山上量起来，我们就会挑一批出来做。爱吃牛肝菌的人可以先冒个泡，等开锅我就知道你们在等。"},{"id":"QW-V14-004","category":"上新开卖","sku":"黄牛肝","keywords":"黄牛肝, 牛肝菌, 炒制","status":"可发","reference":"ChatGPT人工撰写","text":"黄牛肝要做，就要做得像样。太零散的货炒不出一锅的味道，还是要等山上这一波跟上来。喜欢厚实菌子口感的朋友，可以先在这条下面留个话。"},{"id":"QW-V14-005","category":"上新开卖","sku":"黄牛肝","keywords":"黄牛肝, 牛肝菌, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"去年问过黄牛肝的老朋友，今年可以先看着了。它不像白葱红葱每天都在走，要等山货成批起来。等能集中炒的时候，我会单独发出来。"},{"id":"QW-V14-006","category":"上新开卖","sku":"黑牛肝","keywords":"黑牛肝, 牛肝菌, 预热","status":"可发","reference":"ChatGPT人工撰写","text":"黑牛肝后面也会排上。这个菌子炒出来有肉感，香味也厚，不是清清淡淡那种。等山上这一波量起来，我们再做，爱吃牛肝菌的先点个赞。"},{"id":"QW-V14-007","category":"上新开卖","sku":"黑牛肝","keywords":"黑牛肝, 牛肝菌, 厚实","status":"可发","reference":"ChatGPT人工撰写","text":"黑牛肝适合爱吃厚实口感的人。切片下锅以后，菌香出来得很明显。后面要是成批收上来，我想多拍一下切片和下锅的样子。"},{"id":"QW-V14-008","category":"上新开卖","sku":"黑牛肝","keywords":"黑牛肝, 牛肝菌, 开锅","status":"可发","reference":"ChatGPT人工撰写","text":"黑牛肝不是喊个名字就行。要等山上出的货够稳，挑出来也够一锅，炒出来才有意思。等这一口的朋友先喊一声，后面我好知道谁要看。"},{"id":"QW-V14-009","category":"上新开卖","sku":"黑牛肝","keywords":"黑牛肝, 牛肝菌, 下饭","status":"可发","reference":"ChatGPT人工撰写","text":"黑牛肝这类菌子，做得好是很下饭的。它有点肉感，菌香也重，适合认真吃一顿饭。等后面一锅能做起来，我再发现场。"},{"id":"QW-V14-010","category":"上新开卖","sku":"黑牛肝","keywords":"黑牛肝, 牛肝菌, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"有些老客每年都会问黑牛肝。这个品种急不得，山上量没起来的时候说再多也没用。等能炒出一锅像样的，我会先让大家看到。"},{"id":"QW-V14-011","category":"上新开卖","sku":"奶浆菌","keywords":"奶浆菌, 预热, 青椒蒜片","status":"可发","reference":"ChatGPT人 ，是入口的东西，自己先吃着踏实。"},{"id":"QW-V14-147","category":"日常种草","sku":"通用","keywords":"菌子, 朋友圈, 饭桌","status":"可发","reference":"ChatGPT人工撰写","text":"朋友圈拍出来只是一张图，真正的香味都在锅边和饭桌上。看图容易，忍住不吃比较难。"},{"id":"QW-V14-148","category":"日常种草","sku":"通用","keywords":"菌子, 家里吃, 土味","status":"可发","reference":"ChatGPT人工撰写","text":"我们家吃菌子没有那么多讲究，能炒香、能配饭、家里人爱吃，就很够了。"},{"id":"QW-V14-149","category":"日常种草","sku":"通用","keywords":"菌子, 小孩, 家常","status":"可发","reference":"ChatGPT人工撰写","text":"家里小孩吃菌子的时候很直接。好吃就多夹，不喜欢就放一边，比大人说话还准。"},{"id":"QW-V14-150","category":"日常种草","sku":"通用","keywords":"菌子, 夜宵, 拌饭","status":"可发","reference":"ChatGPT人工撰写","text":"晚上饿的时候，热饭配一点菌子最舒服。不用折腾，吃完心里就踏实。"},{"id":"QW-V14-151","category":"信任人设","sku":"通用","keywords":"选菌, 标准, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"收菌子第一眼不是看便宜不便宜，是看能不能进锅。状态差的、虫眼太多的、看着不舒服的，再便宜也要挑出去。老客买的是放心，前面选得松，后面话说得再好都没用。"},{"id":"QW-V14-152","category":"信任人设","sku":"通用","keywords":"山上收菌, 标准, 品质","status":"可发","reference":"ChatGPT人工撰写","text":"山上的菌子每天都不一样。我们一直收，但不是收回来就都能做。品质不稳、量不够的时候，宁愿等一等，也不想硬凑一锅。"},{"id":"QW-V14-153","category":"信任人设","sku":"通用","keywords":"挑菌, 人工, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"挑菌子这个活看着简单，其实最费眼睛。好的一边、次的一边，不能靠一句差不多就混过去。吃的东西，差一点就是差一点。"},{"id":"QW-V14-154","category":"信任人设","sku":"通用","keywords":"洗菌, 不外包, 人工","status":"可发","reference":"ChatGPT人工撰写","text":"洗菌子我们不敢随便丢给不熟的人。哪里藏泥、哪里要削、哪里不能留，都要手上有数。低头洗一天很累，但这一步省不得。"},{"id":"QW-V14-155","category":"信任人设","sku":"干巴菌","keywords":"干巴菌, 清洗, 人工","status":"可发","reference":"ChatGPT人工撰写","text":"干巴菌最磨人的就是清洗。松针和泥沙藏在缝里，水一冲根本不算完。眼睛要看，手也要摸，洗到最后人都坐麻了。"},{"id":"QW-V14-156","category":"信任人设","sku":"通用","keywords":"师傅, 炒制, 手艺","status":"可发","reference":"ChatGPT人工撰写","text":"炒菌子不是谁站到锅边都能炒。火候、下料、起锅时间，都要老手盯着。旁边的人能帮忙递东西，真正掌锅还是得师傅来。"},{"id":"QW-V14-157","category":"信任人设","sku":"通用","keywords":"自己家吃, 食品安全, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"我们家自己吃的菌子，和卖给大家的是一套东西。不是家里吃好的，外面卖另一种。自己家人入口的东西，我才敢拿给老朋友。"},{"id":"QW-V14-158","category":"信任人设","sku":"通用","keywords":"打包, 包装, 核对","status":"可发","reference":"ChatGPT人工撰写","text":"炒好以后还有一堆细活。放凉、分装、封口、核对，哪一步都不难，但哪一步都不能乱。吃的东西发出去，细节不能靠运气。"},{"id":"QW-V14-159","category":"信任人设","sku":"通用","keywords":"老客, 复购, 信任","status":"可发","reference":"ChatGPT人工撰写","text":"老客一年一年回来买，我心里其实压力很大。人家信你，不是让你随便应付。今天糊弄一次，明年人家就不会再来了。"},{"id":"QW-V14-160","category":"信任人设","sku":"通用","keywords":"真实, 忙, 做菌子","status":"可发","reference":"ChatGPT人工撰写","text":"菌子季忙起来，消息有时候回得慢。不是不想回，是后面一堆活：看货、洗菌、备料、盯锅、打包。朋友圈是几张图，背后全是手上的活。"},{"id":"QW-V14-161","category":"信任人设","sku":"白葱","keywords":"白葱, 颜色变化, 解释","status":"可发","reference":"ChatGPT人工撰写","text":"白葱熟了以后颜色会变，这个正常。菌子不是塑料做的，鲜的时候、炒熟以后、放凉以后，状态都不一样。正常的我会讲，不正常的我不会装正常。"},{"id":"QW-V14-162","category":"信任人设","sku":"红葱","keywords":"红葱, 谨慎, 提醒","status":"可发","reference":"ChatGPT人工撰写","text":"红葱我不会乱劝新朋友买。它味道好，但该注意的地方也要说清楚。卖菌子不能只顾着话好听，入口的事情轻不得。"},{"id":"QW-V14-163","category":"信任人设","sku":"通用","keywords":"低价, 真实, 成本","status":"可发","reference":"ChatGPT人工撰写","text":"便宜的东西不是没有，但有些便宜我自己都不敢信。真菌子从收货到处理，每一步都有人在做。大家可以比，但别拿不一样的东西硬比。"},{"id":"QW-V14-164","category":"信任人设","sku":"通用","keywords":"不混货, 品种, 规矩","status":"可发","reference":"ChatGPT人工撰写","text":"不同品种的菌子不能图省事倒在一起。看着都是菌子，吃起来、做起来都不一样。前面混了，后面就说不清。"},{"id":"QW-V14-165","category":"信任人设","sku":"通用","keywords":"老板娘, 直话, 实在","status":"可发","reference":"ChatGPT人工撰写","text":"我说话不一定好听，但做菌子这件事不想绕。有什么就说什么，能做的才说能做。老朋友买久了，知道我这个脾气。"},{"id":"QW-V14-166","category":"信任人设","sku":"通用","keywords":"孩子, 家里吃, 安全","status":"可发","reference":"ChatGPT人工撰写","text":"家里孩子也吃这些东西，所以我对入口的东西会更啰嗦。自己家不敢吃的，我不会拿出去卖给别人。这个道理很简单。"},{"id":"QW-V14-167","category":"信任人设","sku":"通用","keywords":"雨季, 菌子季, 忙","status":"可发","reference":"ChatGPT人工撰写","text":"雨季一来，菌子季就真忙了。山上、厨房、打包台都在转。越忙越要慢一点，不然最容易在小地方出错。"},{"id":"QW-V14-168","category":"信任人设","sku":"通用","keywords":"客户反馈, 老客, 信任","status":"可发","reference":"ChatGPT人工撰写","text":"客户吃完回来一句“跟去年一样”，我会很开心。说明这一年忙下来，味道和做法没有跑偏。做吃的，稳定很重要。"},{"id":"QW-V14-169","category":"信任人设","sku":"通用","keywords":"不外包, 自己人, 洗菌","status":"可发","reference":"ChatGPT人工撰写","text":"有些活看起来可以外包，但我们不敢。洗菌、挑菌、备料，都是入口前面的事，交给不熟的人，心里不踏实。"},{"id":"QW-V14-170","category":"信任人设","sku":"通用","keywords":"辛苦, 手上活, 真实","status":"可发","reference":"ChatGPT人工撰写","text":"做菌子不是坐在手机前卖图片。手上有蒜味、衣服有油味、一天站下来腿酸，这些才是每天真实的样子。"},{"id":"QW-V14-171","category":"信任人设","sku":"通用","keywords":"收货, 标准, 山货","status":"可发","reference":"ChatGPT人工撰写","text":"收货的时候不能只看眼前这一筐。要看这一批山货干不干净、老嫩合不合适、损耗大不大。前面看细一点，后面厨房才不会乱。"},{"id":"QW-V14-172","category":"信任人设","sku":"通用","keywords":"挑菌, 坏损, 不糊弄","status":"可发","reference":"ChatGPT人工撰写","text":"坏的、碎得厉害的、闻着不对的，挑出来一点都不可惜。真正可惜的是把它混进锅里，最后让客户吃出来。"},{"id":"QW-V14-173","category":"信任人设","sku":"白葱","keywords":"白葱, 挑选, 家常","status":"可发","reference":"ChatGPT人工撰写","text":"白葱看着朴素，挑的时候也不能随便。切开以后要再看一遍，坏损的不要进锅。家常菌子也要有家常菌子的规矩。"},{"id":"QW-V14-174","category":"信任人设","sku":"红葱","keywords":"红葱, 熟制, 谨慎","status":"可发","reference":"ChatGPT人工撰写","text":"红葱这个品种，前面再忙也不能赶。处理、翻炒、出锅，每一步都要盯着。爱吃的人多，我反而更要把话和活都做稳。"},{"id":"QW-V14-175","category":"信任人设","sku":"干巴菌","keywords":"干巴菌, 菌王, 人工","status":"可发","reference":"ChatGPT人工撰写","text":"干巴菌贵，不只是因为少。它前面清洗挑拣的人工太重，一盆看着不多，坐下来洗才知道磨人。"},{"id":"QW-V14-176","category":"信任人设","sku":"通用","keywords":"师傅, 老手艺, 锅边","status":"可发","reference":"ChatGPT人工撰写","text":"老师傅炒菌子的时候，眼睛基本都在锅里。什么时候火大一点，什么时候收一点，全靠经验。这个东西机器替不了。"},{"id":"QW-V14-177","category":"信任人设","sku":"通用","keywords":"备料, 蒜, 青椒","status":"可发","reference":"ChatGPT人工撰写","text":"备料看起来不起眼，其实很影响味道。蒜要剥，青椒要切，菌子要分好。锅一热起来，前面有没有准备好马上看得出来。"},{"id":"QW-V14-178","category":"信任人设","sku":"通用","keywords":"黑猪板油, 自己炼, 底油","status":"可发","reference":"ChatGPT人工撰写","text":"底油这件事我们一直很看重。黑猪板油自己炼，麻烦是麻烦，但炒出来的香味更稳。这个偷懒，嘴巴能吃出来。"},{"id":"QW-V14-179","category":"信任人设","sku":"通用","keywords":"独头蒜, 备料, 手工","status":"可发","reference":"ChatGPT人工撰写","text":"独头蒜自己剥，剥多了手上全是味。可是炒菌子少了这个蒜香，又觉得差一点。小活麻烦，但少不了。"},{"id":"QW-V14-180","category":"信任人设","sku":"通用","keywords":"放凉, 分装, 细节","status":"可发","reference":"ChatGPT人工撰写","text":"刚炒好的菌子不能慌慌张张就装。该放凉就放凉，该分装就分装。后面每个小细节，都是为了到手的时候别出问题。"},{"id":"QW-V14-181","category":"信任人设","sku":"通用","keywords":"核对, 发货, 细心","status":"可发","reference":"ChatGPT人工撰写","text":"打包台最怕乱。名字、数量、品种，一份份核对，不然前面做得再好，后面发错也糟心。"},{"id":"QW-V14-182","category":"信任人设","sku":"通用","keywords":"家里吃, 同款, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"有时候家里吃饭，桌上就是今天做给大家的菌子。自己家吃什么，也卖什么，这样我心里最踏实。"},{"id":"QW-V14-183","category":"信任人设","sku":"通用","keywords":"老客, 人情, 生意","status":"可发","reference":"ChatGPT人工撰写","text":"老客不是一个数字。很多人去年买过，今年又回来问，这份信任不能当成理所当然。东西要稳，话也要实。"},{"id":"QW-V14-184","category":"信任人设","sku":"通用","keywords":"不夸大, 真实, 朋友圈","status":"可发","reference":"ChatGPT人工撰写","text":"朋友圈可以写得热闹，但不能写过头。菌子好吃就说好吃，没到时候就说没到时候。做久了，最怕自己把话说虚。"},{"id":"QW-V14-185","category":"信任人设","sku":"通用","keywords":"雨天, 山货, 不确定","status":"可发","reference":"ChatGPT人工撰写","text":"山里的东西跟天气走，不是我们坐在屋里想要多少就有多少。雨多一点、少一点，出来的货都不一样。所以我更愿意看准了再说。"},{"id":"QW-V14-186","category":"信任人设","sku":"通用","keywords":"拒绝, 次货, 标准","status":"可发","reference":"ChatGPT人工撰写","text":"有些货看着也能卖，但我心里过不去。做吃的，最怕把自己标准放低。少做一锅不要紧，别把招牌做坏。"},{"id":"QW-V14-187","category":"信任人设","sku":"通用","keywords":"忙碌, 老板娘, 真实","status":"可发","reference":"ChatGPT人工撰写","text":"菌子季最忙的时候，真的没空把朋友圈写得很漂亮。锅边在催，打包台在催，客户也在问。越是这样，越要把东西做稳。"},{"id":"QW-V14-188","category":"信任人设","sku":"白葱","keywords":"白葱, 家常, 老客","status":"可发","reference":"ChatGPT人工撰写","text":"白葱卖得久，不是靠名字稀奇。它就是家常、顺口、大家接受度高。越是这种常卖的品种，越不能掉以轻心。"},{"id":"QW-V14-189","category":"信任人设","sku":"红葱","keywords":"红葱, 主推, 安全","status":"可发","reference":"ChatGPT人工撰写","text":"红葱大家问得多，但我不会因为问的人多就把提醒省掉。喜欢吃可以，入口前该知道的也要知道。"},{"id":"QW-V14-190","category":"信任人设","sku":"干巴菌","keywords":"干巴菌, 难洗, 不偷懒","status":"可发","reference":"ChatGPT人工撰写","text":"干巴菌洗起来真累，但这活不能糊弄。缝里没挑干净，后面炒得再香都没用。菌王有菌王的麻烦。"},{"id":"QW-V14-191","category":"信任人设","sku":"通用","keywords":"团队, 后厨, 分工","status":"可发","reference":"ChatGPT人工撰写","text":"后厨忙起来，每个人都有活。有人洗，有人切，有人守锅，有人打包。朋友圈只看到成品，真正辛苦都在前面。"},{"id":"QW-V14-192","category":"信任人设","sku":"通用","keywords":"售后, 老客, 责任","status":"可发","reference":"ChatGPT人工撰写","text":"东西发出去以后，我也会看客户反馈。不是卖完就完事，吃得好不好、到手怎么样，后面这些我都在意。"},{"id":"QW-V14-193","category":"信任人设","sku":"通用","keywords":"食品, 入口, 家人","status":"可发","reference":"ChatGPT人工撰写","text":"吃进嘴里的东西，我一直不敢当成普通商品看。家里人吃，老客户也吃，这两个身份放在一起，做事就不敢松。"},{"id":"QW-V14-194","category":"信任人设","sku":"通用","keywords":"不跟风, 山货, 节奏","status":"可发","reference":"ChatGPT人工撰写","text":"外面热闹的时候，我也会着急，但不能跟着乱。山货有山货的节奏，厨房有厨房的标准。到点了自然做，不到点硬做没意思。"},{"id":"QW-V14-195","category":"信任人设","sku":"通用","keywords":"收菌, 老经验, 看货","status":"可发","reference":"ChatGPT人工撰写","text":"看货不是看一眼就完。干不干、老不老、虫眼多不多、气味对不对，都要过一遍。老经验就是在这些小地方用的。"},{"id":"QW-V14-196","category":"信任人设","sku":"通用","keywords":"洗切, 慢工, 入口","status":"可发","reference":"ChatGPT人工撰写","text":"洗和切都是慢活。快一点看着省时间，后面入口就容易出问题。做菌子，前面慢，后面才稳。"},{"id":"QW-V14-197","category":"信任人设","sku":"通用","keywords":"厨房, 火候, 香味","status":"可发","reference":"ChatGPT人工撰写","text":"厨房里最骗不了人的是香味。火候不对，味道就是不对；料不好，香也香不起来。嘴巴比文案诚实。"},{"id":"QW-V14-198","category":"信任人设","sku":"通用","keywords":"包装, 温度, 细节","status":"可发","reference":"ChatGPT人工撰写","text":"包装不是把东西塞进去就完事。温度、封口、摆放都要看。吃的东西到客户手里，细节多一点才安心。"},{"id":"QW-V14-199","category":"信任人设","sku":"通用","keywords":"节奏, 供应, 不硬接","status":"可发","reference":"ChatGPT人工撰写","text":"有时候客户问得多，我也不一定马上接。不是不想卖，是后面做不稳就不能硬接。宁愿慢一点，也别让人失望。"},{"id":"QW-V14-200","category":"信任人设","sku":"通用","keywords":"老客, 介绍, 信任","status":"可发","reference":"ChatGPT人工撰写","text":"老客介绍朋友来买，我会更小心。人家把信任转给你，你要接得住，不能让介绍的人没面子。"},{"id":"QW-V14-201","category":"信任人设","sku":"通用","keywords":"妈妈, 家庭, 食品","status":"可发","reference":"ChatGPT人工撰写","text":"当妈以后，入口的东西会想得更细。不是说几句安全就安全，是每一步都要真的做。"},{"id":"QW-V14-202","category":"信任人设","sku":"通用","keywords":"不卖惨, 辛苦, 实话","status":"可发","reference":"ChatGPT人工撰写","text":"我不太喜欢卖惨，但这个活确实累。累归累，做出来客户愿意再买，这个比什么安慰都实在。"},{"id":"QW-V14-203","category":"信任人设","sku":"通用","keywords":"品种, 清楚, 不混","status":"可发","reference":"ChatGPT人工撰写","text":"菌子品种要说清楚。客户可以不懂，我们做的人不能装糊涂。什么货就按什么货来。"},{"id":"QW-V14-204","category":"信任人设","sku":"通用","keywords":"手工, 小活, 价值","status":"可发","reference":"ChatGPT人工撰写","text":"很多小活看着不值钱，真正做起来才知道费人。剥蒜、洗菌、挑碎、核对，少哪一步都不行。"},{"id":"QW-V14-205","category":"信任人设","sku":"通用","keywords":"标准, 反复, 稳定","status":"可发","reference":"ChatGPT人工撰写","text":"做吃的最怕今天一个样，明天一个样。每次都按标准来，麻烦是麻烦，但客户吃到嘴里才稳定。"},{"id":"QW-V14-206","category":"信任人设","sku":"通用","keywords":"朋友圈, 真实, 生意","status":"可发","reference":"ChatGPT人工撰写","text":"朋友圈不是写作文，我也不想装得太高级。今天后厨忙什么、锅里炒什么、家里吃什么，照实发就够了。"},{"id":"QW-V14-207","category":"信任人设","sku":"通用","keywords":"饭桌, 自家, 卖货","status":"可发","reference":"ChatGPT人工撰写","text":"我们自己家饭桌上吃得下去的东西，才敢往外卖。这个要求不复杂，但每天都要守住。"},{"id":"QW-V14-208","category":"信任人设","sku":"通用","keywords":"经验, 老师傅, 不替代","status":"可发","reference":"ChatGPT人工撰写","text":"老师傅的经验不是写在纸上的。火候到了没有、香味对不对，他在锅边一闻一看就知道。"},{"id":"QW-V14-209","category":"信任人设","sku":"通用","keywords":"收菌, 雨季, 品质","status":"可发","reference":"ChatGPT人工撰写","text":"雨季收菌子，有时候一天一个样。出来得多不代表都好，出来得少也不代表没有好货。关键还是要看货。"},{"id":"QW-V14-210","category":"信任人设","sku":"通用","keywords":"主推, 白葱红葱, 稳","status":"可发","reference":"ChatGPT人工撰写","text":"白葱红葱现在走得多，更要稳。主推不是说随便推，是每天都要保证做出来的东西对得起老客户。"},{"id":"QW-V14-211","category":"信任人设","sku":"通用","keywords":"打包, 忙乱, 不乱","status":"可发","reference":"ChatGPT人工撰写","text":"越忙的时候越怕乱。单子多、消息多、锅也多，但打包核对不能跟着慌。慌一下，后面麻烦就来了。"},{"id":"QW-V14-212","category":"信任人设","sku":"通用","keywords":"老客, 口碑, 一年","status":"可发","reference":"ChatGPT人工撰写","text":"野生菌季节就这么一段时间。做得好，老客明年还会来；做不好，不用人家骂，自己就知道问题大了。"},{"id":"QW-V14-213","category":"信任人设","sku":"通用","keywords":"品质, 少做, 不硬做","status":"可发","reference":"ChatGPT人工撰写","text":"有时候少做一点，反而心里舒服。货不够好，硬做出来也卖得心虚。吃的东西，心虚最要不得。"},{"id":"QW-V14-214","category":"信任人设","sku":"通用","keywords":"客服, 实话, 不绕","status":"可发","reference":"ChatGPT人工撰写","text":"客户问什么，我尽量说实话。能做就说能做，不能做也不绕。绕来绕去，最后伤的是信任。"},{"id":"QW-V14-215","category":"信任人设","sku":"通用","keywords":"家常, 老板娘, 土味","status":"可发","reference":"ChatGPT人工撰写","text":"我们不是大工厂，也不是漂亮品牌。就是云南本地做菌子，手上做什么，朋友圈就发什么。土一点没关系，东西要实在。"},{"id":"QW-V14-216","category":"信任人设","sku":"通用","keywords":"复购, 稳定, 客户","status":"可发","reference":"ChatGPT人工撰写","text":"复购不是靠一次朋友圈喊出来的。客户吃到嘴里觉得稳，明年才会再想起来。"},{"id":"QW-V14-217","category":"信任人设","sku":"通用","keywords":"孩子, 饭桌, 安心","status":"可发","reference":"ChatGPT人工撰写","text":"家里孩子吃的时候，我自己也会看。入口的东西，不是卖出去才算完，自己家饭桌上也要过得去。"},{"id":"QW-V14-218","category":"信任人设","sku":"通用","keywords":"细节, 小事, 安心","status":"可发","reference":"ChatGPT人工撰写","text":"做菌子没有什么神奇秘诀，都是小事。小事一直做对，东西才稳。小事偷懒，客户也会吃出来。"},{"id":"QW-V14-219","category":"信任人设","sku":"通用","keywords":"山货, 等一等, 不急","status":"可发","reference":"ChatGPT人工撰写","text":"山货不能催。急着要，山上也不会按你的意思长。等品质起来，做出来才像样。"},{"id":"QW-V14-220","category":"信任人设","sku":"通用","keywords":"客户, 反馈, 改进","status":"可发","reference":"ChatGPT人工撰写","text":"客户反馈我都会看。哪一批香、哪一批咸淡、哪一批包装怎么样，这些都是后面要改的地方。"},{"id":"QW-V14-221","category":"信任人设","sku":"通用","keywords":"后厨, 老实活, 手工","status":"可发","reference":"ChatGPT人工撰写","text":"后厨都是老实活。没有那么多花架子，就是洗干净、切好、炒透、装稳。每天重复，但不能麻木。"},{"id":"QW-V14-222","category":"信任人设","sku":"通用","keywords":"真货, 不夸, 朴实","status":"可发","reference":"ChatGPT人工撰写","text":"我不想把菌子说得像神仙药。它就是当季山货，好吃、费人工、要认真做。说清楚这些就够了。"},{"id":"QW-V14-223","category":"信任人设","sku":"通用","keywords":"熟人, 老客户, 责任","status":"可发","reference":"ChatGPT人工撰写","text":"很多老客户都像熟人一样。越是熟人，越不能随便。人家信你，你就要把东西看得更紧。"},{"id":"QW-V14-224","category":"信任人设","sku":"通用","keywords":"品控, 一批一批, 稳","status":"可发","reference":"ChatGPT人工撰写","text":"每一批都要看。上一批好，不代表下一批可以松；今天顺利，不代表明天能偷懒。做吃的就是这么磨人。"},{"id":"QW-V14-225","category":"信任人设","sku":"通用","keywords":"时间, 人工, 不省","status":"可发","reference":"ChatGPT人工撰写","text":"有些时间省不了。洗菌子要时间，炒菌子要时间，放凉打包也要时间。省出来的那点快，最后可能都是问题。"},{"id":"QW-V14-226","category":"信任人设","sku":"通用","keywords":"山上, 厨房, 客户","status":"可发","reference":"ChatGPT人工撰写","text":"山上是什么货，厨房就做什么货，客户收到就是什么货。中间这条线不能乱。乱一次，心里就不踏实。"},{"id":"QW-V14-227","category":"信任人设","sku":"通用","keywords":"老客, 主推, 稳妥","status":"可发","reference":"ChatGPT人工撰写","text":"主推的东西，更不能只想着卖得快。越多人买，越要把前面选、洗、炒、包这些环节看紧。"},{"id":"QW-V14-228","category":"信任人设","sku":"通用","keywords":"临时加单, 不乱接, 稳","status":"可发","reference":"ChatGPT人工撰写","text":"有时候临时来问的人很多，我也想都接下来。但后厨一忙，接得过头就容易乱。能稳稳做好的，才敢答应。"},{"id const CATS=['上新开卖','日常种草','信任人设','产品特色'],KEY='qw-moments-used-v14';
let category=CATS[0],query='',used=new Set(loadUsed()),currentId=null,historyIds=[],historyPos=-1;
const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function loadUsed(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function saveUsed(){try{localStorage.setItem(KEY,JSON.stringify([...used]))}catch(e){}}
function hay(x){return [x.text,x.sku,x.category,x.keywords,x.id].join(' ').toLowerCase()}
function pool(includeUsed=false){const q=query.trim().toLowerCase();return copyData.filter(x=>x.category===category&&(includeUsed||!used.has(x.id))&&(!q||hay(x).includes(q)))}
function randomFrom(rows,avoid){if(!rows.length)return null;let choices=rows.filter(x=>x.id!==avoid);if(!choices.length)choices=rows;return choices[Math.floor(Math.random()*choices.length)]}
function renderCategories(){categories.innerHTML=CATS.map(x=>`<button class="cat ${x===category?'active':''}" data-cat="${x}" aria-pressed="${x===category}">${x}</button>`).join('');categories.querySelectorAll('[data-cat]').forEach(button=>button.onclick=()=>{category=button.dataset.cat;historyIds=[];historyPos=-1;renderCategories();visit(randomFrom(pool(),null)?.id)})}
function visit(id,record=true){currentId=id||null;if(record&&id){historyIds=historyIds.slice(0,historyPos+1);historyIds.push(id);historyPos=historyIds.length-1}renderCard()}
function renderCard(){const rows=pool();let item=copyData.find(x=>x.id===currentId);const q=query.trim().toLowerCase();if(!item||item.category!==category||used.has(item.id)||(q&&!hay(item).includes(q))){item=randomFrom(rows,currentId);currentId=item?.id||null;if(item){historyIds=[item.id];historyPos=0}}if(!item){cardHost.innerHTML=`<div class="card empty">${query?'当前分类没有，试试切换分类':'这一类已经全部用过了，可以在下方恢复已用文案'}</div>`;return}const countLabel=query?`当前搜索 ${rows.length} 条`:`本类可用 ${rows.length} 条`;cardHost.innerHTML=`<article class="card" data-id="${item.id}"><div class="meta"><span class="tag">${item.category}</span><span class="tag">${item.sku}</span></div><div class="text">${esc(item.text)}</div><div class="statusline"><span>${countLabel}</span><span>${item.id}</span></div><div class="actions"><button id="copyUse" class="btn primary">复制并标记已用</button><button id="swap" class="btn secondary">换一条</button><button id="previous" class="btn" ${historyPos<=0?'disabled':''}>上一条</button></div></article>`;$('#copyUse').onclick=copyAndUse;$('#swap').onclick=swapOne;$('#previous').onclick=previousOne}
function swapOne(){const rows=pool();if(rows.length<=1){toast('当前条件下只有这一条');return}visit(randomFrom(rows,currentId).id)}
function previousOne(){if(historyPos<=0)return;historyPos--;currentId=historyIds[historyPos];renderCard()}
async function writeClipboard(text){if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);return true}catch(e){}}try{const box=document.createElement('textarea');box.value=text;box.style.position='fixed';box.style.left='-9999px';document.body.appendChild(box);box.focus();box.select();const ok=document.execCommand('copy');box.remove();return ok}catch(e){return false}}
async function copyAndUse(){const item=copyData.find(x=>x.id===currentId);if(!item)return;const ok=await writeClipboard(item.text);if(!ok){toast('复制失败，请手动复制正文');return}used.add(item.id);saveUsed();historyIds=historyIds.filter(id=>!used.has(id));historyPos=historyIds.length-1;updateCounts();renderUsed();toast('已复制，已标记已用');const next=randomFrom(pool(),item.id);setTimeout(()=>visit(next?.id||null),450)}
function updateCounts(){usedTop.textContent=usedSummary.textContent=used.size;totalTop.textContent=copyData.length}

function toast(text){feedback.textContent=text;feedback.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>feedback.classList.remove('show'),1300)}
const categories=$('#categories'),search=$('#search'),clearSearch=$('#clearSearch'),cardHost=$('#cardHost'),usedTop=$('#usedTop'),totalTop=$('#totalTop'),usedSummary=$('#usedSummary'),usedList=$('#usedList'),restoreAll=$('#restoreAll'),clearUsed=$('#clearUsed'),feedback=$('#feedback');
